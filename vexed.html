<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧩 Vexed</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0a0f1a;
  font-family:system-ui,-apple-system,sans-serif;
  color:#fff;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding-bottom:32px;
}
header{
  width:100%;max-width:460px;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 8px;
}
header a{color:rgba(255,255,255,0.35);text-decoration:none;font-size:.82em}
header a:hover{color:#f0c040}
header h1{
  font-size:1.25em;font-weight:800;letter-spacing:-.5px;
  background:linear-gradient(135deg,#f0c040,#ffe880);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.btn{padding:6px 13px;border-radius:7px;border:none;cursor:pointer;font-size:.8em;font-weight:700;transition:all .15s}
.btn-ghost{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.12)}
.btn-ghost:hover{background:rgba(255,255,255,.13);color:#fff}
.btn-ghost:disabled{opacity:.35;cursor:default}
.btn-gold{background:rgba(240,192,64,.18);color:#f0c040;border:1px solid rgba(240,192,64,.35)}

/* Pack tabs */
#pack-tabs{display:flex;gap:8px;margin:4px 0 10px}
.ptab{
  padding:5px 16px;border-radius:20px;font-size:.82em;font-weight:700;
  cursor:pointer;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.05);color:rgba(255,255,255,.45);transition:all .15s
}
.ptab.active{background:rgba(240,192,64,.15);color:#f0c040;border-color:rgba(240,192,64,.4)}

/* Level info */
#info-bar{
  width:100%;max-width:460px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 4px 8px;font-size:.83em;
}
#lv-name{font-weight:700;color:#f0e0a0}
#lv-moves{font-weight:700;color:#fff}
#lv-par{color:rgba(255,255,255,.4)}

/* Grid */
#grid-outer{width:100%;max-width:456px;padding:0 4px}
#grid{
  position:relative;
  width:448px;height:448px;
  background:#111827;
  border:2px solid rgba(255,255,255,.08);
  border-radius:8px;
  overflow:hidden;
  cursor:default;
}
/* subtle grid lines */
#grid::after{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:56px 56px;
  pointer-events:none;z-index:0
}

.block{
  position:absolute;
  width:48px;height:48px;
  border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  cursor:pointer;
  user-select:none;
  z-index:2;
  border:2px solid rgba(255,255,255,.22);
  transition:left .2s cubic-bezier(.4,0,.2,1),top .17s cubic-bezier(.4,0,.2,1),opacity .22s,transform .12s;
}
.block:hover{transform:scale(1.05)}
.block.sel{
  box-shadow:0 0 0 3px #fff,0 0 18px rgba(255,255,255,.35);
  transform:scale(1.1);z-index:5
}
.block.sel:hover{transform:scale(1.1)}
.block.vanish{opacity:0;transform:scale(.4)}

.wall-cell{
  position:absolute;
  width:48px;height:48px;
  background:linear-gradient(135deg,#2a3346,#1a2233);
  border:2px solid #3a4560;
  border-radius:7px;z-index:1;
}

.hint{
  position:absolute;
  width:48px;height:48px;
  border:2px dashed rgba(255,255,255,.2);
  border-radius:11px;z-index:1;
  pointer-events:all;cursor:pointer;
  transition:background .1s;
}
.hint:hover{background:rgba(255,255,255,.07)}

/* Controls */
#controls{
  width:100%;max-width:456px;
  display:flex;gap:8px;padding:10px 4px 6px;justify-content:center
}

/* Level nav */
#level-nav{display:flex;align-items:center;gap:10px}
#level-counter{
  min-width:72px;text-align:center;
  font-size:.82em;font-weight:700;color:rgba(255,255,255,.6)
}
#level-counter .cur-num{color:#f0c040}
#level-counter .solved-mark{color:#22c55e;font-size:.75em;margin-left:3px}

/* Win overlay */
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;align-items:center;justify-content:center}
.ovl.show{display:flex}
.ovl-box{
  background:linear-gradient(145deg,#161e2e,#0f1520);
  border:1px solid rgba(240,192,64,.3);border-radius:16px;
  padding:32px 40px;text-align:center;max-width:320px
}
.ovl-box h2{font-size:1.7em;margin-bottom:6px;color:#f0c040}
.ovl-box p{color:rgba(255,255,255,.55);margin-bottom:22px;line-height:1.5}
.ovl-btns{display:flex;gap:10px;justify-content:center}

/* Score toast */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.4);
  color:#22c55e;padding:8px 18px;border-radius:20px;
  font-size:.85em;font-weight:700;
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:200
}

@media(max-width:480px){
  #grid,#grid-outer{width:calc(100vw - 8px)}
  #grid{height:calc(100vw - 8px)}
}

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
const ROWS=8, COLS=8, CELL=56, BSIZ=48, BOFF=4;

// ═══════════════════════════════════════════════════════════
//  CLASSIC LEVEL DATA  (original Vexed levels, Android format)
//  Converted to 8×8 grid: '.' empty  '1'-'8' block type  '#' wall
// ═══════════════════════════════════════════════════════════
const VEXED_RAW=`Good Night;ba../XX../..../a..b/XabX;4

I Feel Fine;Xb.XX../XX..g.a/X.g.a.X/..eab.X/X.bXg.X/XegXaba;5`;

function parseAndroidLevels(raw){
  return raw.trim().split('\n').map(line=>{
    const parts=line.split(';');
    if(parts.length!==3) return null;
    const [name,board,parStr]=parts;
    const rows=board.split('/');
    const h=rows.length;
    const w=Math.max(...rows.map(r=>r.length));
    if(w>8) return null;
    // first-appearance type remap (a-z → 1-8)
    const tm={};let nt=1;
    for(const row of rows) for(const ch of row)
      if(ch>='a'&&ch<='z'&&!tm[ch]) tm[ch]=nt++;
    if(nt-1>8) return null;
    const padL=Math.floor((8-w)/2);
    const padT=8-h;
    const grid=[];
    for(let i=0;i<padT;i++) grid.push('........');
    for(const row of rows){
      let s='.'.repeat(padL);
      for(const ch of row){
        if(ch==='.'||ch==='~') s+='.';
        else if(ch==='X') s+='#';
        else if(ch>='a'&&ch<='z') s+=String(tm[ch]);
      }
      while(s.length<8) s+='.';
      grid.push(s);
    }
    return{name,par:parseInt(parStr),grid};
  }).filter(Boolean);
}

const CLASSIC_LEVELS=parseAndroidLevels(VEXED_RAW);

// ═══════════════════════════════════════════════════════════
//  EXPANSION 2 — Hand-crafted levels (Led Zeppelin titles)
//  All 40 levels BFS-verified; par = minimum moves to solve
// ═══════════════════════════════════════════════════════════
const CRAFTED_RAW=`Rock and Roll;a..a/b..b;2
Good Times Bad Times;a..b/b..a;2
Communication Breakdown;Xa.aX/Xb.bX;2
Your Time Is Gonna Come;.a.b/.b.a;2
Babe I'm Gonna Leave You;ba.ab;2
You Shook Me;.ab./b..a/a..b/.ba.;2
Dazed and Confused;ab/ba/ab/ba;2
How Many More Times;Xab.X/X....X/Xba.X;2
The Lemon Song;a..X./X..../b...b/.a.a.;2
Ramble On;a..X../X....../...b.b./.a.a..;2
Heartbreaker;a..X../X....../c....c./.a.a..;2
Tea for One;a.Xb../XaXX.b;2
Black Mountain Side;a..X/X..a/b..X/X..b;3

Going to California;ab.cd/dc.ba;4
When the Levee Breaks;a..b../c..d../b..a../d..c..;4

Dancing Days;abab/baba/abab;4
No Quarter;..a.X../..X...../..b...b/....a.a.;4
Black Dog;a.b.c.d/d.a.b.c;4
The Rover;a.c.b.d/d.b.c.a;4
Over the Hills and Far Away;abcd/dcba;6
Kashmir;a.b.c.d/c.d.a.b;6
The Rain Song;abcd/cdab/badc/dcba;6
Achilles Last Stand;.abcd./....../.dcba.;6
Houses of the Holy;a.b.c/XXaXX/c.b.a;9
Trampled Under Foot;abcba/XXXXX/abcba;9
The Song Remains the Same;b.a..X./X.X...../b..c..c/...a..a.;10`;

const CRAFTED_LEVELS=parseAndroidLevels(CRAFTED_RAW);

// ═══════════════════════════════════════════════════════════
//  PRNG
// ═══════════════════════════════════════════════════════════
function makePRNG(seed){
  return()=>{
    seed=(seed+0x6D2B79F5)|0;
    let t=Math.imul(seed^(seed>>>15),1|seed);
    t=(t+Math.imul(t^(t>>>7),61|t))^t;
    return((t^(t>>>14))>>>0)/4294967296;
  };
}

// ═══════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════
let packName='classic';
let lvIdx=0;
let grid=[];        // [row][col] = null | {type,el}  (type 9 = wall)
let sel=null;       // {r,c}
let moveCount=0;
let undoStack=[];
let animating=false;
let solved={classic:new Set(),algo:new Set(),crafted:new Set()};
let algoLevels=[];

function currentPack(){
  if(packName==='classic') return CLASSIC_LEVELS;
  if(packName==='crafted') return CRAFTED_LEVELS;
  return algoLevels;
}

// ═══════════════════════════════════════════════════════════
//  DOM HELPERS
// ═══════════════════════════════════════════════════════════
const gridEl=document.getElementById('grid');
const SCALE=()=>gridEl.clientWidth/448; // responsive scale factor

function px(col){ return col*CELL+BOFF; }
function py(row){ return row*CELL+BOFF; }

function makeEl(type,r,c){
  const el=document.createElement('div');
  if(type===9){
    el.className='wall-cell';
  } else {
    el.className='block';
    el.style.background=`linear-gradient(135deg,${BCOLORS[type]},${BDARK[type]})`;
    el.style.boxShadow=`0 3px 10px ${BCOLORS[type]}55`;
    el.textContent=EMOJIS[type];
    el.addEventListener('click',e=>{e.stopPropagation();onBlockClick(el);});
  }
  el.style.left=px(c)+'px';
  el.style.top =py(r)+'px';
  gridEl.appendChild(el);
  return el;
}

function findEl(el){
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++)
      if(grid[r][c]&&grid[r][c].el===el) return {r,c};
  return null;
}

function isBlock(r,c){ return r>=0&&r<ROWS&&c>=0&&c<COLS&&grid[r][c]&&grid[r][c].type!==9; }
function isEmpty(r,c){ return r>=0&&r<ROWS&&c>=0&&c<COLS&&!grid[r][c]; }

// ═══════════════════════════════════════════════════════════
//  LEVEL LOADING
// ═══════════════════════════════════════════════════════════
function loadLevel(idx){
  const pack=currentPack();
  if(idx<0||idx>=pack.length) return;
  lvIdx=idx;
  gridEl.innerHTML='';
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  sel=null; moveCount=0; undoStack=[]; animating=false;

  // If this algo level hasn't been generated yet (user jumped ahead of background gen), build it now
  if(packName==='algo'&&!algoLevels[idx]) algoLevels[idx]=buildAlgoLevel(idx);
  const lv=pack[idx];
  lv.grid.forEach((row,r)=>{
    [...row].forEach((ch,c)=>{
      if(ch==='.') return;
      const type=ch==='#'?9:+ch;
      const el=makeEl(type,r,c);
      grid[r][c]={type,el};
    });
  });

  // Apply instant gravity & clear any accidental initial matches
  gravityInstant();
  let safety=0;
  while(removeMatches(false)&&safety++<15) gravityInstant();

  updateUI();
  renderDots();
}

// ═══════════════════════════════════════════════════════════
//  CLICK HANDLING
// ═══════════════════════════════════════════════════════════
function onBlockClick(el){
  if(animating) return;
  const pos=findEl(el);
  if(!pos) return;
  const {r,c}=pos;
  if(grid[r][c].type===9) return;

  if(sel&&sel.r===r&&sel.c===c){ clearSel(); return; }
  selectBlock(r,c);
}

gridEl.addEventListener('click',e=>{
  if(animating) return;
  if(e.target===gridEl||e.target.classList.contains('hint')){
    if(!sel) return;
    const rect=gridEl.getBoundingClientRect();
    const s=SCALE();
    const col=Math.floor((e.clientX-rect.left)/(CELL*s));
    const row=Math.floor((e.clientY-rect.top )/(CELL*s));
    if(col<0||col>=COLS||row<0||row>=ROWS) return;
    if(row!==sel.r) return; // must be same row
    tryMove(sel.r,sel.c,col);
  }
});

function selectBlock(r,c){
  clearSel();
  sel={r,c};
  grid[r][c].el.classList.add('sel');
  showHints(r,c);
}

function clearSel(){
  if(sel&&grid[sel.r]&&grid[sel.r][sel.c])
    grid[sel.r][sel.c].el.classList.remove('sel');
  sel=null;
  gridEl.querySelectorAll('.hint').forEach(h=>h.remove());
}

function showHints(r,c){
  gridEl.querySelectorAll('.hint').forEach(h=>h.remove());
  for(const dir of[-1,1]){
    let col=c+dir;
    while(col>=0&&col<COLS&&isEmpty(r,col)){
      const h=document.createElement('div');
      h.className='hint';
      h.style.left=px(col)+'px';
      h.style.top =py(r)+'px';
      h.dataset.col=col;
      h.addEventListener('click',e=>{
        e.stopPropagation();
        if(!animating&&sel) tryMove(sel.r,sel.c,+h.dataset.col);
      });
      gridEl.appendChild(h);
      col+=dir;
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  MOVEMENT
// ═══════════════════════════════════════════════════════════
function tryMove(row,fromCol,toCol){
  if(!sel||sel.r!==row) return;
  if(toCol===fromCol){ clearSel(); return; }
  if(!isEmpty(row,toCol)) return;
  // Verify path clear
  const dir=toCol>fromCol?1:-1;
  for(let c=fromCol+dir;c!==toCol;c+=dir)
    if(!isEmpty(row,c)) return;

  pushUndo();
  const blk=grid[row][fromCol];
  clearSel();
  animating=true;

  grid[row][fromCol]=null;
  grid[row][toCol]=blk;
  blk.el.style.left=px(toCol)+'px';

  setTimeout(()=>{
    moveCount++;
    updateUI();
    runGravityMatch();
  },220);
}

// ═══════════════════════════════════════════════════════════
//  GRAVITY + MATCH CYCLE
// ═══════════════════════════════════════════════════════════
function gravityInstant(){
  let moved=true;
  while(moved){
    moved=false;
    for(let c=0;c<COLS;c++){
      for(let r=ROWS-2;r>=0;r--){
        if(grid[r][c]&&grid[r][c].type!==9&&isEmpty(r+1,c)){
          grid[r+1][c]=grid[r][c];
          grid[r][c]=null;
          grid[r+1][c].el.style.top=py(r+1)+'px';
          moved=true;
        }
      }
    }
  }
}

function runGravityMatch(){
  // Collect falling blocks
  const falls=[];
  for(let c=0;c<COLS;c++){
    for(let r=ROWS-2;r>=0;r--){
      if(grid[r][c]&&grid[r][c].type!==9){
        let nr=r;
        while(nr+1<ROWS&&isEmpty(nr+1,c)) nr++;
        if(nr!==r) falls.push({blk:grid[r][c],fr:r,tr:nr,c});
      }
    }
  }
  if(!falls.length){ checkMatches(); return; }

  let maxDist=0;
  falls.forEach(({blk,fr,tr,c})=>{
    grid[fr][c]=null; grid[tr][c]=blk;
    blk.el.style.top=py(tr)+'px';
    maxDist=Math.max(maxDist,tr-fr);
  });

  setTimeout(()=>runGravityMatch(), 80+maxDist*40);
}

function checkMatches(){
  const matched=new Set();
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(!isBlock(r,c)) continue;
      const t=grid[r][c].type;
      if(isBlock(r,c+1)&&grid[r][c+1].type===t){ matched.add(`${r},${c}`);matched.add(`${r},${c+1}`); }
      if(isBlock(r+1,c)&&grid[r+1][c].type===t){ matched.add(`${r},${c}`);matched.add(`${r+1},${c}`); }
    }
  }
  if(!matched.size){
    animating=false;
    updateUI();
    checkWin();
    return;
  }
  matched.forEach(k=>{
    const [r,c]=k.split(',').map(Number);
    grid[r][c].el.classList.add('vanish');
  });
  setTimeout(()=>{
    matched.forEach(k=>{
      const [r,c]=k.split(',').map(Number);
      if(grid[r][c]){ grid[r][c].el.remove(); grid[r][c]=null; }
    });
    runGravityMatch();
  },260);
}

function removeMatches(animate){
  // Instant version for level init
  const matched=new Set();
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(!isBlock(r,c)) continue;
      const t=grid[r][c].type;
      if(isBlock(r,c+1)&&grid[r][c+1].type===t){ matched.add(`${r},${c}`);matched.add(`${r},${c+1}`); }
      if(isBlock(r+1,c)&&grid[r+1][c].type===t){ matched.add(`${r},${c}`);matched.add(`${r+1},${c}`); }
    }
  }
  if(!matched.size) return false;
  matched.forEach(k=>{ const [r,c]=k.split(',').map(Number); if(grid[r][c]){grid[r][c].el.remove();grid[r][c]=null;} });
  return true;
}

// ═══════════════════════════════════════════════════════════
//  WIN CHECK
// ═══════════════════════════════════════════════════════════
function checkWin(){
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++)
      if(isBlock(r,c)) return; // still blocks remaining

  solved[packName].add(lvIdx);
  renderDots();

  const par=currentPack()[lvIdx].par;
  const diff=moveCount-par;
  document.getElementById('win-title').textContent=
    diff<0?'🏆 Under Par!':diff===0?'🥇 Perfect Par!':'✅ Level Clear!';
  document.getElementById('win-msg').textContent=
    `Solved in ${moveCount} move${moveCount!==1?'s':''}  ·  Par: ${par}`+
    (diff<0?`  ·  ${-diff} under par!`:diff===0?'  ·  Perfect!':``);

  const pack=currentPack();
  document.getElementById('next-ovl-btn').style.display=
    lvIdx+1<pack.length?'':'none';

  document.getElementById('win-ovl').classList.add('show');
  showToast(diff<0?`${-diff} under par! 🎉`:diff===0?'Exactly par! 🥇':'Cleared! ✅');
}

function closeOverlay(){ document.getElementById('win-ovl').classList.remove('show'); }

// ═══════════════════════════════════════════════════════════
//  UNDO
// ═══════════════════════════════════════════════════════════
function pushUndo(){
  const snap=grid.map(row=>row.map(cell=>cell?{type:cell.type}:null));
  undoStack.push({snap,moves:moveCount});
  if(undoStack.length>15) undoStack.shift();
  updateUI();
}

function undoMove(){
  if(!undoStack.length||animating) return;
  const {snap,moves}=undoStack.pop();
  gridEl.innerHTML='';
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  snap.forEach((row,r)=>row.forEach((cell,c)=>{
    if(!cell) return;
    const el=makeEl(cell.type,r,c);
    grid[r][c]={type:cell.type,el};
  }));
  moveCount=moves; sel=null; animating=false;
  updateUI();
}

// ═══════════════════════════════════════════════════════════
//  NAV
// ═══════════════════════════════════════════════════════════
function restartLevel(){ loadLevel(lvIdx); }
function nextLevel(){
  const pack=currentPack();
  closeOverlay();
  if(lvIdx+1<pack.length) loadLevel(lvIdx+1);
}
function prevLevel(){ if(lvIdx>0) loadLevel(lvIdx-1); }

function switchPack(name){
  packName=name;
  document.querySelectorAll('.ptab').forEach((el,i)=>
    el.classList.toggle('active',['classic','algo','crafted'][i]===name));
  if(name==='algo'&&!algoLevels.length) startAlgoGeneration();
  loadLevel(0);
}

// ═══════════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════════
function updateUI(){
  const lv=currentPack()[lvIdx];
  document.getElementById('lv-name').textContent=`Level ${lvIdx+1}: ${lv.name}`;
  document.getElementById('lv-moves').textContent=`Moves: ${moveCount}`;
  const d=moveCount-lv.par;
  const pc=d<0?'#22c55e':d===0?'#f0c040':'rgba(255,255,255,.4)';
  const pe=document.getElementById('lv-par');
  pe.style.color=pc;
  pe.textContent=`Par: ${lv.par}`;
  document.getElementById('undo-btn').disabled=!undoStack.length||animating;
  document.getElementById('next-btn').disabled=lvIdx+1>=currentPack().length;
}

function renderDots(){
  const pack=currentPack();
  const total=pack.length;
  const isSolved=solved[packName].has(lvIdx);
  const counter=document.getElementById('level-counter');
  counter.innerHTML=`<span class="cur-num">${lvIdx+1}</span> / ${total}${isSolved?' <span class="solved-mark">✓</span>':''}`;
  document.getElementById('prev-btn').disabled=(lvIdx===0);
  document.getElementById('next-btn').disabled=(lvIdx===total-1);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.style.opacity='0',2400);
}

// ═══════════════════════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(animating) return;
  if(e.key==='Escape'){ clearSel(); return; }
  if(e.key==='z'&&(e.ctrlKey||e.metaKey)){ e.preventDefault(); undoMove(); return; }
  if(!sel) return;
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    e.preventDefault();
    const dir=e.key==='ArrowLeft'?-1:1;
    const {r,c}=sel;
    let nc=c+dir;
    while(nc>=0&&nc<COLS&&isEmpty(r,nc)) nc+=dir;
    nc-=dir;
    if(nc!==c) tryMove(r,c,nc);
  }
});

// ═══════════════════════════════════════════════════════════
//  ALGORITHMIC LEVEL GENERATION
// ═══════════════════════════════════════════════════════════
function gravityArr(g){
  let moved=true;
  while(moved){
    moved=false;
    for(let c=0;c<COLS;c++)
      for(let r=ROWS-2;r>=0;r--)
        if(g[r][c]>0&&g[r][c]!==9&&g[r+1][c]===0){ g[r+1][c]=g[r][c];g[r][c]=0;moved=true; }
  }
}

// Mirror of gravityArr — blocks float toward row 0 (used during reverse-construction generation)
function gravityUp(g){
  let moved=true;
  while(moved){
    moved=false;
    for(let c=0;c<COLS;c++)
      for(let r=1;r<ROWS;r++)
        if(g[r][c]>0&&g[r][c]!==9&&g[r-1][c]===0){ g[r-1][c]=g[r][c];g[r][c]=0;moved=true; }
  }
}

function hasMatch(g){
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++){
      if(!g[r][c]||g[r][c]===9) continue; // skip empty and walls
      if(c+1<COLS&&g[r][c+1]===g[r][c]) return true;
      if(r+1<ROWS&&g[r+1][c]===g[r][c]) return true;
    }
  return false;
}

// Generate a single algo level by index (synchronous, called on-demand).
// For hard levels (diff≥27) we explicitly try 3-block seeds on odd attempts
// so that ~half the hardest levels are 3-per-color matches, like classic levels.
const PINK_FLOYD_TITLES=[
  'Breathe','On the Run','Time','The Great Gig in the Sky','Money',
  'Us and Them','Any Colour You Like','Brain Damage','Eclipse','Speak to Me',
  'Shine On You Crazy Diamond','Welcome to the Machine','Have a Cigar',
  'Wish You Were Here','Dogs','Pigs (Three Different Ones)','Sheep',
  'Comfortably Numb','Hey You','Nobody Home','Vera','Bring the Boys Back Home',
  'In the Flesh','The Thin Ice','Another Brick in the Wall','The Happiest Days',
  'Empty Spaces','Young Lust','One of My Turns','Don\'t Leave Me Now',
  'Waiting for the Worms','Stop','The Trial','Outside the Wall',
  'Astronomy Domine','Interstellar Overdrive','Set the Controls for the Heart of the Sun',
  'Careful with That Axe, Eugene','A Saucerful of Secrets','See Emily Play',
  'Learning to Fly','High Hopes','Keep Talking','One of These Days',
  'Several Species of Small Furry Animals','Echoes','Fearless','San Tropez',
  'Seamus','Bike',
];

function buildAlgoLevel(lvl){
  const td=Math.floor(lvl*35/49);
  let found=null;
  for(let a=0;a<30&&!found;a++){
    const forceBlocks=(td>=27&&a%2===1)?3:undefined;
    found=genLevel(lvl*30+a,td,forceBlocks);
  }
  const title=PINK_FLOYD_TITLES[lvl]||`Puzzle ${lvl+1}`;
  if(found){ found.name=title; return found; }
  return{...CLASSIC_LEVELS[lvl%CLASSIC_LEVELS.length],name:title};
}

// Initialise the 50-slot cache. Levels are built on-demand in loadLevel() —
// no background work means no jank; each level only costs time when first visited.
function startAlgoGeneration(){
  algoLevels=Array(50).fill(null);
  algoLevels[0]=buildAlgoLevel(0); // pre-build level 1 so the tab opens instantly
}

// Kept for compatibility; now a no-op (generation is lazy/background)
function generateAlgoLevels(){ if(!algoLevels.length) startAlgoGeneration(); }

// BFS solver — returns true if the grid state is solvable within `limit` iterations
function canSolve(gridIn,limit=2000){
  const g2s=g=>g.map(r=>r.join('')).join('|');
  const clone=g=>g.map(r=>[...r]);
  function step(g){
    // gravity (skip walls)
    let moved=true;
    while(moved){ moved=false;
      for(let c=0;c<COLS;c++) for(let r=ROWS-2;r>=0;r--)
        if(g[r][c]>0&&g[r][c]!==9&&g[r+1][c]===0){ g[r+1][c]=g[r][c];g[r][c]=0;moved=true; }
    }
    // matches (skip walls)
    let again=true;
    while(again){ again=false;
      const m=new Set();
      for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
        if(!g[r][c]||g[r][c]===9) continue;
        if(c+1<COLS&&g[r][c+1]===g[r][c]){m.add(`${r},${c}`);m.add(`${r},${c+1}`);}
        if(r+1<ROWS&&g[r+1][c]===g[r][c]){m.add(`${r},${c}`);m.add(`${r+1},${c}`);}
      }
      if(m.size){ m.forEach(k=>{const[r,c]=k.split(',').map(Number);g[r][c]=0;});
        let mv=true; while(mv){ mv=false;
          for(let c=0;c<COLS;c++) for(let r=ROWS-2;r>=0;r--)
            if(g[r][c]>0&&g[r][c]!==9&&g[r+1][c]===0){g[r+1][c]=g[r][c];g[r][c]=0;mv=true;}
        } again=true; }
    }
  }
  const start=clone(gridIn);
  step(start);
  if(start.every(r=>r.every(v=>v===0||v===9))) return true;
  const visited=new Set([g2s(start)]);
  const queue=[start];
  let iters=0;
  while(queue.length&&iters<limit){
    iters++;
    const g=queue.shift();
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      if(!g[r][c]||g[r][c]===9) continue;
      for(const dir of[-1,1]){
        let nc=c+dir;
        while(nc>=0&&nc<COLS&&g[r][nc]===0) nc+=dir;
        nc-=dir;
        if(nc===c) continue;
        const ng=clone(g);
        ng[r][nc]=ng[r][c]; ng[r][c]=0;
        step(ng);
        if(ng.every(row=>row.every(v=>v===0||v===9))) return true;
        const key=g2s(ng);
        if(!visited.has(key)){ visited.add(key); queue.push(ng); }
      }
    }
  }
  return false;
}

function genLevel(seed,diff,forceBlocks){
  if(diff===undefined) diff=Math.min(seed,35);
  const rng=makePRNG(seed*7919+1337);

  // ── Scale parameters with difficulty ──────────────────────
  // Colors: 2 (easy) → 5 (hard). Each color adds one pair/triple to clear.
  const numColors = diff<9  ? 2
                  : diff<18 ? 3
                  : diff<27 ? 4
                  :           5;

  // Blocks per color: 2 normally; hard levels sometimes use 3 (like classic levels).
  // forceBlocks lets the caller override (used by buildAlgoLevel for variety).
  const blocksPerColor = forceBlocks || (diff<27 ? 2 : rng()<0.4 ? 3 : 2);

  // Cap colors at 3 for 3-block levels (9 blocks max keeps BFS tractable)
  const effectiveColors = blocksPerColor===3 ? Math.min(numColors,3) : numColors;

  // How many random spreading slides per color (2 easy → 5 hard)
  const numMoves = 2+Math.floor(diff*0.09);

  // Max columns a single slide can travel (limits 1-move solutions)
  const maxSlide = 2+Math.floor(diff*0.07);

  const g=Array.from({length:ROWS},()=>Array(COLS).fill(0));

  // ── 1. Draw wall segments (rows 2–6, never col 0 or 7) ────
  const numWalls = diff<12 ? 1 : diff<24 ? 2 : 3;
  const usedWallRows=new Set();
  for(let w=0;w<numWalls;w++){
    // Pick a row not yet occupied by another wall band
    let wallRow=-1;
    for(let t=0;t<12;t++){
      const r=2+Math.floor(rng()*5); // rows 2–6
      if(!usedWallRows.has(r)){wallRow=r;break;}
    }
    if(wallRow<0) continue;
    usedWallRows.add(wallRow);

    // Segment length 2–5, always fits within cols 1–6
    const segLen=2+Math.floor(rng()*4);
    const maxStart=Math.max(1,7-segLen);
    const colA=1+Math.floor(rng()*maxStart);
    const colB=Math.min(colA+segLen-1,6);

    for(let c=colA;c<=colB;c++) g[wallRow][c]=9;

    // Punch at least one interior gap on longer segments so blocks aren't trapped
    if(colB-colA>=3){
      const gapC=colA+1+Math.floor(rng()*(colB-colA-1));
      g[wallRow][gapC]=0;
    }
  }

  // ── 2–5. For each color: spawn → float up → spread ────────
  // Generating in reverse: start from the "solved" adjacent state, then scramble
  // using upward gravity. Reversing those steps (with normal gravity) is always valid.
  for(let color=1;color<=effectiveColors;color++){
    const count=blocksPerColor;
    // For 3-block: place with stride=2 (gap between blocks) so they land at different
    // heights after upward gravity, avoiding the guaranteed-adjacent problem.
    const stride = count===3 ? 2 : 1;
    const span = (count-1)*stride;

    // Place blocks in the bottom row (spaced for count=3, consecutive for count=2)
    let placed=false;
    for(let att=0;att<40&&!placed;att++){
      const startC=Math.floor(rng()*(COLS-span));
      if(startC+span>=COLS) continue;

      // Need all target cells empty in the bottom row
      let ok=true;
      for(let i=0;i<count;i++) if(g[ROWS-1][startC+i*stride]!==0){ok=false;break;}
      if(!ok) continue;

      // Tentatively place and apply upward gravity, then verify no immediate match
      const snap=g.map(row=>[...row]);
      for(let i=0;i<count;i++) g[ROWS-1][startC+i*stride]=color;
      gravityUp(g);

      if(hasMatch(g)){
        // Restore and try another position
        for(let r=0;r<ROWS;r++) g[r]=snap[r];
        continue;
      }
      placed=true;
    }
    if(!placed) return null;

    // numMoves random horizontal slides, each followed by upward gravity
    for(let m=0;m<numMoves;m++){
      const blocks=[];
      for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++)
        if(g[r][c]===color) blocks.push([r,c]);
      if(!blocks.length) break;

      const [br,bc]=blocks[Math.floor(rng()*blocks.length)];
      const dir=rng()<0.5?-1:1;

      // Slide up to maxSlide steps in direction dir
      let nc=bc+dir,steps=0;
      while(nc>=0&&nc<COLS&&g[br][nc]===0&&steps<maxSlide){nc+=dir;steps++;}
      nc-=dir;
      if(nc===bc) continue; // couldn't move

      const snap=g.map(row=>[...row]);
      g[br][nc]=color; g[br][bc]=0;
      gravityUp(g);

      // Undo if the slide creates an immediate adjacency (instant match = invalid start)
      if(hasMatch(g)) for(let r=0;r<ROWS;r++) g[r]=snap[r];
    }
  }

  // ── 6. Flip to normal downward gravity (the actual puzzle state) ──
  gravityArr(g);

  if(hasMatch(g)) return null;

  // Verify all colors have the expected block count (placement may have failed silently)
  for(let color=1;color<=effectiveColors;color++){
    let cnt=0;
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(g[r][c]===color) cnt++;
    if(cnt!==blocksPerColor) return null;
  }

  // BFS solvability check (2000 iterations is sufficient; higher limits slow failures)
  if(!canSolve(g,2000)) return null;

  return{
    name:`Puzzle ${seed+1}`,
    par:effectiveColors*blocksPerColor,
    grid:g.map(row=>row.map(v=>v===9?'#':v?String(v):'.').join(''))
  };
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
loadLevel(0);
</script>
