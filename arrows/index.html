<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Snake Escape</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0c0c18;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 14px 12px;
  gap: 12px;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

h1 {
  font-size: 1.25em;
  font-weight: 800;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #c8a8ff;
  margin-top: 2px;
}

/* ── HUD ── */
#hud {
  display: flex;
  align-items: center;
  justify-content: center;
  width: min(440px, 100%);
}
#lives { font-size: 1.4em; letter-spacing: 3px; }

/* ── Board ── */
#board-wrap {
  position: relative;
  width: min(min(85vh - 120px, 620px), calc(100vw - 16px));
  aspect-ratio: 1;
  border-radius: 12px;
  overflow: hidden;
  background: #10101e;
  border: 1.5px solid #1e1e38;
}
#board-canvas {
  display: block;
  width: 100%;
  height: 100%;
  cursor: pointer;
}

/* ── Status / Controls ── */
#status { font-size: 0.82em; color: #777; min-height: 1.1em; text-align: center; }

#controls { display: flex; gap: 10px; }
#controls button {
  background: #1a1a30;
  color: #bbb;
  border: 1px solid #30305a;
  border-radius: 8px;
  padding: 9px 18px;
  font-size: 0.9em;
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
}
#controls button:hover { background: #26264a; color: #fff; }

/* ── Overlay ── */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.78);
  align-items: center;
  justify-content: center;
  z-index: 50;
}
#overlay.show { display: flex; }
#overlay-box {
  background: #13132a;
  border: 2px solid #3a2a6a;
  border-radius: 18px;
  padding: 34px 42px;
  text-align: center;
  min-width: 250px;
}
#overlay-box h2 { font-size: 2.2em; margin-bottom: 4px; }
#overlay-box p  { color: #999; margin-bottom: 4px; font-size: 0.92em; }
.big-score { font-size: 2em; font-weight: 700; color: #ffd700; margin: 8px 0 18px; }
#overlay-box button {
  background: #5a3a9a;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 12px 28px;
  font-size: 1em;
  cursor: pointer;
  transition: background 0.12s;
}
#overlay-box button:hover { background: #6a4aaa; }

</style>
</head>
<body>

<h1>Snake Escape</h1>

<div id="hud">
  <div id="lives">❤️❤️❤️</div>
</div>

<div id="board-wrap">
  <canvas id="board-canvas"></canvas>
</div>

<div id="status"></div>

<div id="controls">
  <button onclick="newGame()">🔀 New</button>
  <button onclick="showHint()">💡 Hint</button>

</div>


<div id="overlay">
  <div id="overlay-box">
    <h2 id="ov-icon"></h2>
    <p id="ov-msg"></p>
    <div class="big-score" id="ov-score"></div>
    <button onclick="newGame()">Play Again</button>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const ROWS = 20, COLS = 20;
const DIRS = ['up','down','left','right'];
const DELTA = { up:[-1,0], down:[1,0], left:[0,-1], right:[0,1] };
const OPP   = { up:'down', down:'up', left:'right', right:'left' };

const COLORS = [
  '#e74c3c','#3498db','#2ecc71','#f39c12',
  '#9b59b6','#e91e63','#00bcd4','#8bc34a',
  '#ff5722','#607d8b','#ff9800','#673ab7',
];

// ── Board Shapes ──────────────────────────────────────────────────────────────
const SHAPE_DEFS = [
  { name: 'rectangle', fn: () => true },
  { name: 'cross', fn: (r, c) => {
    const hr = Math.floor(ROWS * 0.30), hc = Math.floor(COLS * 0.30);
    return Math.abs(r - (ROWS-1)/2) < hr + 0.5 || Math.abs(c - (COLS-1)/2) < hc + 0.5;
  }},
  { name: 'diamond', fn: (r, c) => {
    return Math.abs(r+0.5 - ROWS/2) / (ROWS/2) + Math.abs(c+0.5 - COLS/2) / (COLS/2) < 1.05;
  }},
  { name: 'circle', fn: (r, c) => {
    const dr = r+0.5 - ROWS/2, dc = c+0.5 - COLS/2;
    return dr*dr / (ROWS/2)**2 + dc*dc / (COLS/2)**2 < 1.0;
  }},
  { name: 'L', fn: (r, c) => {    // cuts upper-right corner
    return c <= Math.floor(COLS * 0.55) || r >= Math.floor(ROWS * 0.45);
  }},
  { name: 'chevron', fn: (r, c) => {          // ► right-pointing triangle
    const mr = (ROWS-1) / 2;
    return c + 1 >= Math.abs(r - mr) * COLS / ROWS;
  }},
  { name: 'T', fn: (r, c) => {
    return r <= Math.floor(ROWS * 0.4) ||
           (c >= Math.floor(COLS * 0.33) && c < Math.floor(COLS * 0.67));
  }},
];

let shapeFn   = () => true;
let shapeName = 'rectangle';
let distGrid  = [];   // BFS depth from shape boundary — used for Phase-2 ordering

function isValidCell(r, c) {
  return r >= 0 && r < ROWS && c >= 0 && c < COLS && shapeFn(r, c);
}

// Steps in direction `dir` until hitting an invalid/out-of-bounds cell.
function distInDir(r, c, dir) {
  const [dr, dc] = DELTA[dir];
  let d = 0, rr = r+dr, cc = c+dc;
  while (isValidCell(rr, cc)) { d++; rr += dr; cc += dc; }
  return d;
}

function pickShape() {
  const s = SHAPE_DEFS[Math.floor(Math.random() * SHAPE_DEFS.length)];
  shapeFn   = s.fn;
  shapeName = s.name;
  precomputeDistGrid();
}

function precomputeDistGrid() {
  distGrid = Array.from({length:ROWS}, () => new Array(COLS).fill(Infinity));
  const queue = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!isValidCell(r, c)) continue;
      const onBorder = Object.values(DELTA).some(([dr,dc]) => !isValidCell(r+dr, c+dc));
      if (onBorder) { distGrid[r][c] = 0; queue.push([r, c]); }
    }
  }
  for (let i = 0; i < queue.length; i++) {
    const [r, c] = queue[i];
    for (const [dr, dc] of Object.values(DELTA)) {
      const nr = r+dr, nc = c+dc;
      if (isValidCell(nr, nc) && distGrid[nr][nc] === Infinity) {
        distGrid[nr][nc] = distGrid[r][c] + 1;
        queue.push([nr, nc]);
      }
    }
  }
}

// ── State ─────────────────────────────────────────────────────────────────────
// piece: { cells[[r,c],...], tipDir, color, removed }
//   cells[0] = tail end, cells[last] = tip cell
let pieces    = [];
let cellPiece = [];   // cellPiece[r][c] = piece index or -1
let strikes, cleared, hintId, pressedId = -1, snakeMode = true;

const canvas = document.getElementById('board-canvas');
const ctx    = canvas.getContext('2d');
let CS; // logical cell size (px)
let DPR = 1;

// ── Helpers ───────────────────────────────────────────────────────────────────
function inBounds(r, c) { return r >= 0 && r < ROWS && c >= 0 && c < COLS; }
function shuffle(a) {
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function perpOf(dir) { return (dir==='up'||dir==='down') ? ['left','right'] : ['up','down']; }

function initGrid() {
  cellPiece = Array.from({length:ROWS}, () => new Array(COLS).fill(-1));
}
function placePiece(p) {
  const id = pieces.length;
  pieces.push(p);
  for (const [r,c] of p.cells) cellPiece[r][c] = id;
}
function removePiece(id) {
  for (const [r,c] of pieces[id].cells) cellPiece[r][c] = -1;
  pieces[id].removed = true;
}

// ── Blocking ──────────────────────────────────────────────────────────────────
// A piece is free if its tip's path in tipDir to the board edge is clear.
function isBlocked(id) {
  const p = pieces[id];
  const [tr, tc] = p.cells[p.cells.length - 1];
  const [dr, dc] = DELTA[p.tipDir];
  let r = tr + dr, c = tc + dc;
  while (isValidCell(r, c)) {
    if (cellPiece[r][c] !== -1) return true;
    r += dr; c += dc;
  }
  return false;
}

function anyFree() {
  for (let id = 0; id < pieces.length; id++)
    if (!pieces[id].removed && !isBlocked(id)) return true;
  return false;
}

// ── Generation ────────────────────────────────────────────────────────────────
// Simulate game to verify all pieces can be removed; retry generation if not.
function isBoardSolvable() {
  const removed = new Array(pieces.length).fill(false);
  let progress = true;
  while (progress) {
    progress = false;
    for (let id = 0; id < pieces.length; id++) {
      if (removed[id]) continue;
      const p   = pieces[id];
      const tip = p.cells[p.cells.length - 1];
      const [dr, dc] = DELTA[p.tipDir];
      let r = tip[0]+dr, c = tip[1]+dc, ok = true;
      while (isValidCell(r, c)) {
        const bid = cellPiece[r][c];
        if (bid !== -1 && !removed[bid]) { ok = false; break; }
        r += dr; c += dc;
      }
      if (ok) { removed[id] = true; progress = true; }
    }
  }
  return removed.every(v => v);
}

function newGame() {
  strikes = 0; cleared = 0; hintId = -1;
  document.getElementById('overlay').classList.remove('show');
  setStatus('');
  pickShape();
  let attempts = 0;
  do {
    pieces = [];
    initGrid();
    generateBoard();
    attempts++;
  } while (!isBoardSolvable() && attempts < 500);
  if (attempts > 1) console.log(`Snake Escape: solvable board after ${attempts} attempt(s)`);
  setupCanvas();
  render();
  updateHUD();
}

function dirOf(a, b) {
  if (b[0] < a[0]) return 'up';
  if (b[0] > a[0]) return 'down';
  if (b[1] < a[1]) return 'left';
  return 'right';
}

function generateBoard() {
  // Phase 1 – place shapes (cells only, no direction yet)
  const targets = shuffle(
    Array.from({length:ROWS*COLS}, (_,i) => [Math.floor(i/COLS), i%COLS])
      .filter(([r,c]) => isValidCell(r,c))
  );
  let colorIdx = 0;
  for (const [sr, sc] of targets) {
    if (cellPiece[sr][sc] !== -1) continue;
    const cells = growShape(sr, sc);
    if (cells.length < 2) {
      // Completely surrounded — extend an adjacent piece's endpoint to absorb this cell
      let merged = false;
      for (const d of shuffle([...DIRS])) {
        const [dr, dc] = DELTA[d];
        const nr = sr+dr, nc = sc+dc;
        if (!isValidCell(nr, nc)) continue;
        const pid = cellPiece[nr][nc];
        if (pid === -1) continue;
        const pc = pieces[pid].cells;
        const atHead = pc[0][0] === nr && pc[0][1] === nc;
        const atTail = pc[pc.length-1][0] === nr && pc[pc.length-1][1] === nc;
        if (atHead) { pc.unshift([sr, sc]); cellPiece[sr][sc] = pid; merged = true; break; }
        if (atTail) { pc.push([sr, sc]);   cellPiece[sr][sc] = pid; merged = true; break; }
      }
      // If still unmergeable (extreme edge case), skip — cell stays empty
      continue;
    }
    pieces.push({ cells, tipDir:'right', color:COLORS[colorIdx++ % COLORS.length], removed:false });
    for (const [r,c] of cells) cellPiece[r][c] = pieces.length - 1;
  }

  // Phase 2 – assign directions via topological-sort queue.
  // Pieces that can't yet be assigned (both exits blocked by unprocessed pieces)
  // are requeued and retried after their blockers are resolved.  Only when a
  // piece has been requeued more times than there are remaining pieces in the
  // queue (i.e. a true dependency cycle) do we fall back to force-assignment.
  const order = pieces
    .map((p, id) => {
      const dist = Math.min(...p.cells.map(([r,c]) => distGrid[r][c] ?? 0));
      const mid  = p.cells[Math.floor(p.cells.length / 2)];
      return { id, dist, r: mid[0], c: mid[1] };
    })
    .sort((a, b) => a.dist - b.dist || a.r - b.r || a.c - b.c)
    .map(x => x.id);

  const queue        = [...order];
  const requeueCount = new Array(pieces.length).fill(0);
  const removedBefore = new Set();
  const dirCount = { up:0, down:0, left:0, right:0 };

  while (queue.length > 0) {
    const id = queue.shift();          // queue.length is now one shorter
    const p  = pieces[id];
    const n  = p.cells.length;

    const candA = { rev:false, dir: dirOf(p.cells[n-2], p.cells[n-1]) };
    const candB = { rev:true,  dir: dirOf(p.cells[1],   p.cells[0])   };
    const edgeDist = (cand) => {
      const cell = cand.rev ? p.cells[0] : p.cells[n-1];
      return distInDir(cell[0], cell[1], cand.dir);
    };
    const candidates = edgeDist(candA) <= edgeDist(candB) ? [candA, candB] : [candB, candA];

    const validCands = candidates.filter(cand => {
      const tipCell = cand.rev ? p.cells[0] : p.cells[n-1];
      const [dr, dc] = DELTA[cand.dir];
      let r = tipCell[0]+dr, c = tipCell[1]+dc;
      while (isValidCell(r, c)) {
        const bid = cellPiece[r][c];
        if (bid !== -1 && !removedBefore.has(bid)) return false;
        r += dr; c += dc;
      }
      return true;
    });
    if (validCands.length > 1)
      validCands.sort((a, b) => dirCount[a.dir] - dirCount[b.dir]);

    if (validCands.length > 0) {
      // Valid assignment found — commit and mark as processed.
      const { rev, dir } = validCands[0];
      if (rev) p.cells.reverse();
      p.tipDir = dir;
      dirCount[dir]++;
      removedBefore.add(id);
    } else if (requeueCount[id] < queue.length) {
      // Blockers still in queue — defer and retry after they're processed.
      requeueCount[id]++;
      queue.push(id);
    } else {
      // True dependency cycle: force-assign, avoiding self-blocking directions.
      const ownCells = new Set(p.cells.map(([r,c]) => `${r},${c}`));
      const exitClear = (opt) => {
        const [dr, dc] = DELTA[opt.dir];
        let r = opt.cell[0]+dr, c = opt.cell[1]+dc;
        while (isValidCell(r, c)) {
          if (ownCells.has(`${r},${c}`)) return false;
          r += dr; c += dc;
        }
        return true;
      };
      const endOpts = [
        { rev:false, dir: dirOf(p.cells[n-2], p.cells[n-1]), cell: p.cells[n-1] },
        { rev:true,  dir: dirOf(p.cells[1],   p.cells[0]),   cell: p.cells[0]   },
      ];
      const safeOpts = endOpts.filter(exitClear);
      const pool = safeOpts.length > 0 ? safeOpts : endOpts;
      const best = pool.sort((a, b) =>
        distInDir(a.cell[0], a.cell[1], a.dir) - distInDir(b.cell[0], b.cell[1], b.dir)
      )[0];
      if (best.rev) p.cells.reverse();
      p.tipDir = best.dir;
      removedBefore.add(id);
    }
  }

  // Phase 3 – variety pass: flip individual pieces to the rarer direction
  // whenever the board stays solvable. Edge pieces often had only one valid
  // exit in Phase 2, so this breaks the "same zone = same direction" clustering.
  const dc3 = { up:0, down:0, left:0, right:0 };
  for (const p of pieces) dc3[p.tipDir]++;
  for (const id of shuffle(pieces.map((_, i) => i))) {
    const p = pieces[id];
    const oldDir = p.tipDir;
    const newDir = dirOf(p.cells[1], p.cells[0]);  // flip endpoint
    if (dc3[newDir] >= dc3[oldDir]) continue;       // wouldn't improve variety
    p.cells.reverse();
    p.tipDir = newDir;
    if (isBoardSolvable()) {
      dc3[oldDir]--;
      dc3[newDir]++;
    } else {
      p.cells.reverse();      // revert — flip broke solvability
      p.tipDir = oldDir;
    }
  }
}

function growShape(sr, sc) {
  const maxLen   = 3 + Math.floor(Math.random() * 7); // 3–9 cells
  const cells    = [[sr, sc]];
  // Track cells claimed by THIS piece so it can't cross its own path.
  const owned    = new Set([`${sr},${sc}`]);

  // Start toward the nearest shape boundary so one endpoint tends to point outward.
  const edgeDist = d => distInDir(sr, sc, d);
  const sortedDirs = shuffle([...DIRS]).sort((a, b) => edgeDist(a) - edgeDist(b));
  let dir = null;
  for (const d of sortedDirs) {
    const [dr, dc] = DELTA[d];
    const nr = sr+dr, nc = sc+dc;
    if (isValidCell(nr, nc) && cellPiece[nr][nc] === -1 && !owned.has(`${nr},${nc}`)) { dir = d; break; }
  }
  if (!dir) return cells; // fully surrounded — caller will merge into a neighbour

  const [dr0, dc0] = DELTA[dir];
  let r = sr+dr0, c = sc+dc0;
  cells.push([r, c]);
  owned.add(`${r},${c}`);

  let turnsLeft = Math.floor(Math.random() * 9); // 0–8 turns — winding shapes
  while (cells.length < maxLen) {
    const [dr, dc] = DELTA[dir];
    const nr = r+dr, nc = c+dc;
    if (isValidCell(nr, nc) && cellPiece[nr][nc] === -1 && !owned.has(`${nr},${nc}`)) {
      r = nr; c = nc; cells.push([r, c]); owned.add(`${r},${c}`);
    } else if (turnsLeft > 0 && Math.random() < 0.90) {
      const perps = shuffle([...perpOf(dir)]);
      let ok = false;
      for (const pd of perps) {
        const [pdr, pdc] = DELTA[pd];
        const pr = r+pdr, pc = c+pdc;
        if (isValidCell(pr, pc) && cellPiece[pr][pc] === -1 && !owned.has(`${pr},${pc}`)) {
          dir = pd; r = pr; c = pc; cells.push([r, c]); owned.add(`${r},${c}`); turnsLeft--; ok = true; break;
        }
      }
      if (!ok) break;
    } else break;
  }
  return cells;
}

// ── Canvas ────────────────────────────────────────────────────────────────────
function setupCanvas() {
  const wrap = document.getElementById('board-wrap');
  const size = wrap.clientWidth;
  DPR = window.devicePixelRatio || 1;
  canvas.width  = Math.round(size * DPR);
  canvas.height = Math.round(size * DPR);
  CS = size / Math.max(ROWS, COLS);
}

function cellCenter(r, c) {
  return [(c + 0.5) * CS * DPR, (r + 0.5) * CS * DPR];
}

function render(skipId = -1) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawGrid();
  drawPressHighlight(pressedId);
  for (let id = 0; id < pieces.length; id++) {
    if (pieces[id].removed || id === skipId) continue;
    drawPiece(id, isBlocked(id), id === hintId);
  }
}

// Highlights only the pressed piece's own cells (snakes drawn on top).
function drawPressHighlight(id) {
  if (id === -1 || !pieces[id] || pieces[id].removed) return;
  ctx.fillStyle = 'rgba(255,255,255,0.13)';
  for (const [r, c] of pieces[id].cells)
    ctx.fillRect(c*CS*DPR, r*CS*DPR, CS*DPR, CS*DPR);
}

function drawGrid() {
  // Void (outside shape): near-black
  ctx.fillStyle = '#06060f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // Board cells: fill then grid lines in two passes for speed
  ctx.fillStyle = '#10101e';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (isValidCell(r, c))
        ctx.fillRect(c*CS*DPR, r*CS*DPR, CS*DPR, CS*DPR);
    }
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5 * DPR;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (isValidCell(r, c))
        ctx.strokeRect(c*CS*DPR, r*CS*DPR, CS*DPR, CS*DPR);
    }
  }
}

function drawPiece(id, _blocked, hint) {
  const p   = pieces[id];
  const pts = p.cells.map(([r,c]) => cellCenter(r, c));
  // Extend the tail end backward ~40% of a cell so the shaft fills the full
  // cell rather than stopping at center — snakes look tightly packed.
  const backDir = p.cells.length > 1
    ? dirOf(p.cells[1], p.cells[0])
    : OPP[p.tipDir];
  const [bdr, bdc] = DELTA[backDir];
  const ext = CS * DPR * 0.4;
  pts[0] = [pts[0][0] + bdc * ext, pts[0][1] + bdr * ext];
  if (snakeMode) drawSnake(pts, p.color, 1.0, p.tipDir, hint);
  else           drawArrow(pts, p.color, 1.0, p.tipDir, hint);
}

// Draws a clean thin-line arrow through pts[], arrowhead at last point in tipDir
function drawArrow(pts, color, alpha, tipDir, hint, ox = 0, oy = 0) {
  if (pts.length === 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;

  const lw = Math.max(1.5 * DPR, CS * DPR * 0.045);

  // ── Shaft ──
  ctx.strokeStyle = color;
  ctx.lineWidth   = lw;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.beginPath();
  ctx.moveTo(pts[0][0]+ox, pts[0][1]+oy);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0]+ox, pts[i][1]+oy);
  ctx.stroke();

  // ── Arrowhead — small triangle with a shaft tail to connect to the line ──
  const tip = pts[pts.length - 1];
  const unit = CS * DPR;
  const [dr, dc] = DELTA[tipDir];
  const ahl = unit * 0.32;   // triangle length
  const ahw = unit * 0.18;   // triangle half-width
  const tailLen = unit * 0.1; // small tail that links shaft to triangle base
  const perpX = -dr * ahw, perpY = dc * ahw;
  const apex = [tip[0]+ox + dc*ahl,        tip[1]+oy + dr*ahl       ]; // tip of triangle
  const base = [tip[0]+ox + dc*tailLen,    tip[1]+oy + dr*tailLen   ]; // base of triangle
  // Draw connector tail from shaft end to triangle base
  ctx.strokeStyle = color;
  ctx.lineWidth   = lw;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(tip[0]+ox, tip[1]+oy);
  ctx.lineTo(base[0], base[1]);
  ctx.stroke();
  // Draw filled triangle
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(apex[0], apex[1]);
  ctx.lineTo(base[0]+perpX, base[1]+perpY);
  ctx.lineTo(base[0]-perpX, base[1]-perpY);
  ctx.closePath();
  ctx.fill();

  // ── Hint glow ──
  if (hint) {
    ctx.save();
    ctx.globalAlpha  = 0.85;
    ctx.shadowColor  = '#ffffff';
    ctx.shadowBlur   = 14 * DPR;
    ctx.strokeStyle  = 'rgba(255,255,255,0.7)';
    ctx.lineWidth    = lw + 3 * DPR;
    ctx.lineCap      = 'round';
    ctx.lineJoin     = 'round';
    ctx.beginPath();
    ctx.moveTo(pts[0][0]+ox, pts[0][1]+oy);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0]+ox, pts[i][1]+oy);
    ctx.stroke();
    ctx.restore();
  }

  ctx.restore();
}

function toggleMode() {
  snakeMode = !snakeMode;
  document.getElementById('mode-btn').textContent = snakeMode ? '➡️ Arrow' : '🐍 Snake';
  render();
}

// Draws a snake: thick rounded body + head with eyes and forked tongue.
// Same call signature as drawArrow so it drops in everywhere.
// Builds (and caches) a repeating scale pattern tile using the same overlapping-
// circle geometry as the CSS radial-gradient fish-scale pattern.
// The tile has 4 corner radial gradients at radius r = 2.414·s; their arcs
// intersect to form scale-shaped cells, just like the CSS version.
const _scalePatCache = {};
function getScalePattern(bodyW) {
  const key = Math.round(bodyW);
  if (_scalePatCache[key]) return _scalePatCache[key];
  const s  = bodyW * 0.15;           // controls scale size relative to body
  const r  = 2.414 * s;
  const sz = Math.ceil(2 * r);
  const oc  = new OffscreenCanvas(sz, sz);
  const oc2 = oc.getContext('2d');
  for (const [cx, cy] of [[0,0],[sz,0],[0,sz],[sz,sz]]) {
    const g = oc2.createRadialGradient(cx, cy, r * 0.74, cx, cy, r);
    g.addColorStop(0,    'rgba(0,0,0,0)');
    g.addColorStop(0.65, 'rgba(0,0,0,0.04)');
    g.addColorStop(1,    'rgba(0,0,0,0.35)');
    oc2.fillStyle = g;
    oc2.beginPath();
    oc2.arc(cx, cy, r, 0, Math.PI * 2);
    oc2.fill();
  }
  _scalePatCache[key] = ctx.createPattern(oc, 'repeat');
  return _scalePatCache[key];
}

function drawSnake(pts, color, alpha, tipDir, hint, ox = 0, oy = 0) {
  if (pts.length === 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;

  const unit  = CS * DPR;
  const bodyW = unit * 0.38;
  const [dr, dc] = DELTA[tipDir];
  // In canvas space: forward = (dc, dr), perpendicular = (-dr, dc)
  const fwdX = dc,  fwdY = dr;
  const perpX = -dr, perpY = dc;

  // ── Hint glow (behind body) ─────────────────────────────────────────────
  if (hint) {
    ctx.save();
    ctx.globalAlpha = alpha * 0.85;
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur  = 14 * DPR;
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth   = bodyW + 4 * DPR;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.beginPath();
    ctx.moveTo(pts[0][0]+ox, pts[0][1]+oy);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0]+ox, pts[i][1]+oy);
    ctx.stroke();
    ctx.restore();
  }

  // ── Body ─────────────────────────────────────────────────────────────────
  // Use 'butt' lineCap so we can replace the tail cap with a pointed triangle.
  const n = pts.length;
  ctx.strokeStyle = color;
  ctx.lineWidth   = bodyW;
  ctx.lineCap     = 'butt';
  ctx.lineJoin    = 'round';
  ctx.beginPath();
  ctx.moveTo(pts[0][0]+ox, pts[0][1]+oy);
  for (let i = 1; i < n; i++) ctx.lineTo(pts[i][0]+ox, pts[i][1]+oy);
  ctx.stroke();
  // Subtle dark overlay for depth
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.moveTo(pts[0][0]+ox, pts[0][1]+oy);
  for (let i = 1; i < n; i++) ctx.lineTo(pts[i][0]+ox, pts[i][1]+oy);
  ctx.stroke();

  // ── Pointed tail ─────────────────────────────────────────────────────────
  if (n >= 2) {
    const tdx = pts[0][0] - pts[1][0], tdy = pts[0][1] - pts[1][1];
    const tdLen = Math.sqrt(tdx*tdx + tdy*tdy) || 1;
    const tnx = tdx/tdLen, tny = tdy/tdLen;   // unit vector toward tail tip
    const tpx = -tny, tpy = tnx;               // perpendicular
    const tipLen  = bodyW * 0.75;  // how far the point extends past pts[0]
    const baseHalf = bodyW * 0.38; // half-width of the triangle base (narrower = sharper)
    const tipX = pts[0][0]+ox + tnx*tipLen, tipY = pts[0][1]+oy + tny*tipLen;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(pts[0][0]+ox + tpx*baseHalf, pts[0][1]+oy + tpy*baseHalf);
    ctx.lineTo(pts[0][0]+ox - tpx*baseHalf, pts[0][1]+oy - tpy*baseHalf);
    ctx.closePath();
    ctx.fill();
    // Dark overlay on tail tip to match body depth shading
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(pts[0][0]+ox + tpx*baseHalf, pts[0][1]+oy + tpy*baseHalf);
    ctx.lineTo(pts[0][0]+ox - tpx*baseHalf, pts[0][1]+oy - tpy*baseHalf);
    ctx.closePath();
    ctx.fill();
  }

  // ── Scale texture — CSS-inspired overlapping-circle pattern ─────────────
  // Same geometry as the radial-gradient fish-scale CSS pattern: 4 corner
  // radial gradients per tile whose arcs intersect to form scale-shaped cells.
  const scalePat = getScalePattern(bodyW);
  if (scalePat) {
    ctx.save();
    ctx.strokeStyle = scalePat;
    ctx.lineWidth   = bodyW;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.beginPath();
    ctx.moveTo(pts[0][0]+ox, pts[0][1]+oy);
    for (let i = 1; i < n; i++) ctx.lineTo(pts[i][0]+ox, pts[i][1]+oy);
    ctx.stroke();
    ctx.restore();
  }

  // ── Head — elongated ellipse, wider in forward direction ─────────────────
  const tip     = pts[n - 1];
  const headRX  = bodyW * 0.80;   // forward radius (long axis)
  const headRY  = bodyW * 0.62;   // side radius   (short axis)
  const headRot = Math.atan2(fwdY, fwdX);
  const hx = tip[0] + ox + fwdX * unit * 0.18;
  const hy = tip[1] + oy + fwdY * unit * 0.18;

  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(hx, hy, headRX, headRY, headRot, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.24)';
  ctx.lineWidth   = 1.5 * DPR;
  ctx.stroke();
  // Scale pattern on head — clip to ellipse then fill with pattern
  if (scalePat) {
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(hx, hy, headRX, headRY, headRot, 0, Math.PI * 2);
    ctx.clip();
    ctx.fillStyle = scalePat;
    ctx.fillRect(hx - headRX - 2, hy - headRY - 2, headRX * 2 + 4, headRY * 2 + 4);
    ctx.restore();
  }

  // ── Eyes ─────────────────────────────────────────────────────────────────
  const eyeR   = bodyW * 0.14;
  const eyeOff = headRY * 0.60;
  const fwdOff = headRX * 0.28;
  const e1x = hx + perpX*eyeOff + fwdX*fwdOff, e1y = hy + perpY*eyeOff + fwdY*fwdOff;
  const e2x = hx - perpX*eyeOff + fwdX*fwdOff, e2y = hy - perpY*eyeOff + fwdY*fwdOff;
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.beginPath(); ctx.arc(e1x, e1y, eyeR, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(e2x, e2y, eyeR, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.beginPath(); ctx.arc(e1x+fwdX*eyeR*0.35, e1y+fwdY*eyeR*0.35, eyeR*0.55, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(e2x+fwdX*eyeR*0.35, e2y+fwdY*eyeR*0.35, eyeR*0.55, 0, Math.PI*2); ctx.fill();

  // ── Nostrils ─────────────────────────────────────────────────────────────
  const nRad  = eyeR  * 0.33;
  const nFwd  = headRX * 0.80;
  const nSide = headRY * 0.42;
  ctx.fillStyle = 'rgba(0,0,0,0.50)';
  ctx.beginPath(); ctx.arc(hx+fwdX*nFwd+perpX*nSide, hy+fwdY*nFwd+perpY*nSide, nRad, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(hx+fwdX*nFwd-perpX*nSide, hy+fwdY*nFwd-perpY*nSide, nRad, 0, Math.PI*2); ctx.fill();

  // ── Forked tongue ─────────────────────────────────────────────────────────
  const tBase = headRX * 0.95;
  const tLen  = unit   * 0.12;
  const tFork = unit   * 0.09;
  const tbx = hx+fwdX*tBase, tby = hy+fwdY*tBase;
  const tex  = tbx+fwdX*tLen, tey = tby+fwdY*tLen;
  ctx.strokeStyle = '#ff3333';
  ctx.lineWidth   = Math.max(1, 1.5 * DPR);
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(tbx, tby); ctx.lineTo(tex, tey);
  ctx.moveTo(tex, tey); ctx.lineTo(tex+perpX*tFork, tey+perpY*tFork);
  ctx.moveTo(tex, tey); ctx.lineTo(tex-perpX*tFork, tey-perpY*tFork);
  ctx.stroke();

  ctx.restore();
}

function shadeColor(hex, pct) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, Math.max(0, ((n>>16) & 0xff) + Math.round(255*pct)));
  const g = Math.min(255, Math.max(0, ((n>> 8) & 0xff) + Math.round(255*pct)));
  const b = Math.min(255, Math.max(0, ((n    ) & 0xff) + Math.round(255*pct)));
  return `rgb(${r},${g},${b})`;
}

// ── Centralised animation loop ────────────────────────────────────────────────
// All animations register here so render() is called ONCE per RAF frame
// regardless of how many are running concurrently.
const _animList = [];
let   _rafId    = 0;

function _animLoop(ts) {
  _rafId = 0;
  render();                                   // one static redraw per frame
  for (let i = _animList.length - 1; i >= 0; i--) {
    if (!_animList[i](ts)) _animList.splice(i, 1);
  }
  if (_animList.length > 0) {
    _rafId = requestAnimationFrame(_animLoop);
  } else {
    render();  // clear any residual drawing from the final animation frame
  }
}

function _addAnim(fn) {
  _animList.push(fn);
  if (!_rafId) _rafId = requestAnimationFrame(_animLoop);
}

// ── Animation ─────────────────────────────────────────────────────────────────
function animateStrike(id, onDone) {
  const p   = pieces[id];
  const pts = p.cells.map(([r,c]) => cellCenter(r,c));
  let frame = 0;
  _addAnim(ts => {
    const ox = (frame % 4 < 2 ? 1 : -1) * 6 * DPR;
    if (snakeMode) drawSnake(pts, '#ff2244', 1.0, p.tipDir, false, ox, 0);
    else           drawArrow(pts, '#ff2244', 1.0, p.tipDir, false, ox, 0);
    if (++frame < 9) return true;
    onDone && onDone();
    return false;
  });
}

// Snake-movement exit — purely visual, state already updated before call.
function buildSnakePath(cells, tipDir) {
  const path = [...cells];
  const [dr, dc] = DELTA[tipDir];
  const [lr, lc] = cells[cells.length - 1];
  for (let k = 1; k <= ROWS + COLS + 2; k++)
    path.push([lr + k*dr, lc + k*dc]);
  return path;
}

function snakePos(path, cellIdx, t) {
  const pos = cellIdx + t;
  const i0  = Math.floor(pos), frac = pos - i0;
  const p0  = path[Math.min(i0,   path.length - 1)];
  const p1  = path[Math.min(i0+1, path.length - 1)];
  return [p0[0] + (p1[0]-p0[0])*frac, p0[1] + (p1[1]-p0[1])*frac];
}

function animateExit(pCells, pColor, pTipDir) {
  const n     = pCells.length;
  const path  = buildSnakePath(pCells, pTipDir);
  const ext   = CS * DPR * 0.4;
  const SPEED = 9; // cells per second — same as 0.15/frame at 60 fps
  let t       = 0;
  let lastTs  = null;
  _addAnim(ts => {
    if (lastTs !== null) t += Math.min((ts - lastTs) / 1000, 0.1) * SPEED;
    lastTs = ts;
    const pts = pCells.map((_, i) => {
      const [r, c] = snakePos(path, i, t);
      return [(c + 0.5) * CS * DPR, (r + 0.5) * CS * DPR];
    });
    const i0   = Math.min(Math.floor(t), path.length - 2);
    const from = path[i0], to = path[i0 + 1];
    const tDr  = to[0] - from[0], tDc = to[1] - from[1];
    pts[0] = [pts[0][0] - tDc * ext, pts[0][1] - tDr * ext];
    const alpha = t < n ? 1 : Math.max(0, 1 - (t - n) / (ROWS + 1));
    if (snakeMode) drawSnake(pts, pColor, alpha, pTipDir, false);
    else           drawArrow(pts, pColor, alpha, pTipDir, false);
    return alpha > 0.02;
  });
}

// ── Pointer input (mouse + touch via Pointer Events) ─────────────────────────
function pieceAtPointer(e) {
  const rect   = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const cx  = (e.clientX - rect.left) * scaleX;
  const cy  = (e.clientY - rect.top)  * scaleY;
  const col = Math.floor(cx / (CS * DPR));
  const row = Math.floor(cy / (CS * DPR));
  if (!isValidCell(row, col)) return -1;
  const id = cellPiece[row][col];
  return (id !== -1 && !pieces[id].removed) ? id : -1;
}

canvas.style.touchAction = 'none';   // prevent scroll hijack on mobile

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  pressedId = pieceAtPointer(e);
  if (pressedId !== -1) render();
});

canvas.addEventListener('pointerup', e => {
  if (pressedId !== -1) {
    const id = pressedId;
    pressedId = -1;
    onClick(id);           // commit the click on release
  }
});

canvas.addEventListener('pointermove', e => {
  if (pressedId === -1) return;
  if (pieceAtPointer(e) !== pressedId) {
    pressedId = -1;   // moved off — cancel without firing
    render();
  }
});

canvas.addEventListener('pointercancel', () => {
  pressedId = -1;
  render();
});

function onClick(id) {
  hintId = -1;

  if (isBlocked(id)) {
    strikes++;
    updateHUD();
    animateStrike(id, () => { if (strikes >= 3) showGameOver(); });
  } else {
    // Update state immediately — animation is a non-blocking visual overlay
    const { cells, color, tipDir } = pieces[id];
    cleared++;
    removePiece(id);
    updateHUD();
    render();
    animateExit([...cells], color, tipDir);

    const rem = pieces.filter(p => !p.removed).length;
    if (rem === 0) setTimeout(showWin, 150);
  }
}

// ── Hint ─────────────────────────────────────────────────────────────────────
function showHint() {
  hintId = -1;
  for (let id = 0; id < pieces.length; id++) {
    if (!pieces[id].removed && !isBlocked(id)) { hintId = id; break; }
  }
  if (hintId < 0) return;
  render();
  setTimeout(() => { hintId = -1; render(); }, 1400);
}

// ── HUD / Status ──────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('lives').textContent = '❤️'.repeat(3-strikes) + '🖤'.repeat(strikes);
}
function setStatus(msg) { document.getElementById('status').textContent = msg; }

// ── End Screens ───────────────────────────────────────────────────────────────
function showOverlay(icon, msg, scoreText) {
  document.getElementById('ov-icon').textContent  = icon;
  document.getElementById('ov-msg').textContent   = msg;
  document.getElementById('ov-score').textContent = scoreText;
  document.getElementById('overlay').classList.add('show');
}
function showWin() {
  showOverlay('🎉', 'All snakes escaped!', '');
}
function showGameOver() {
  const rem = pieces.filter(p => !p.removed).length;
  showOverlay('💀', `${rem} snake${rem!==1?'s':''} remaining`, '');
}

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => { setupCanvas(); render(); });

// ── Boot ─────────────────────────────────────────────────────────────────────
newGame();
</script>
