<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Minesweeper</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0f1923;
  background-image: radial-gradient(ellipse at center, #1a2e3d 0%, #0a1018 100%);
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  color: #fff;
  user-select: none;
  -webkit-user-select: none;
}

/* ── Nav ── */
.nav {
  width: 100%;
  max-width: 600px;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.nav a { color: rgba(255,255,255,0.45); text-decoration: none; font-size: 0.9em; transition: color .15s; }
.nav a:hover { color: #f0c040; }
.nav .sep { color: rgba(255,255,255,0.2); }

/* ── Header ── */
h1 {
  font-size: clamp(1.8em, 7vw, 2.8em);
  font-weight: 900;
  color: #f0c040;
  text-shadow: 0 2px 8px rgba(240,192,64,0.3);
  margin-bottom: 12px;
}

/* ── Controls bar ── */
.controls {
  width: 100%;
  max-width: 600px;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
button, select {
  padding: 8px 14px;
  font-size: 0.9em;
  border: 2px solid #c8960a;
  border-radius: 8px;
  cursor: pointer;
  background: linear-gradient(145deg, #f0c040, #d4a010);
  color: #2a1800;
  font-weight: bold;
  transition: all .15s;
}
button:hover { background: linear-gradient(145deg, #ffe060, #e8b820); }
select { background: rgba(255,255,255,0.08); color: #f0e0a0; border-color: rgba(255,255,255,0.15); }
select option { background: #1a2e3d; color: #fff; }

/* ── Status bar ── */
.statusbar {
  width: 100%;
  max-width: 600px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  padding: 8px 14px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  font-size: 1.1em;
}
.stat-mines { color: #ff6b6b; font-weight: 700; font-size: 1.2em; }
.stat-face  { font-size: 1.5em; cursor: pointer; }
.stat-time  { color: #7ec8e3; font-weight: 700; font-size: 1.2em; }

/* ── Board ── */
#board-wrap {
  overflow: auto;
  max-width: 100vw;
  padding-bottom: 8px;
}
#board {
  touch-action: none;
  display: inline-grid;
  gap: 2px;
  background: #8b8b8b;
  border: 3px solid #bbb;
  border-radius: 4px;
  padding: 3px;
}
.cell {
  width: var(--csz);
  height: var(--csz);
  background: #c0c0c0;
  border: 2px solid;
  border-color: #fff #888 #888 #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: calc(var(--csz) * 0.55);
  cursor: pointer;
  transition: background .05s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.cell.covered { border-color: #fff #888 #888 #fff; background: #c8c8c8; }
.cell.covered:active { border-color: #888 #fff #fff #888; background: #b8b8b8; }
.cell.revealed { border-color: #aaa; border-width: 1px; background: #d4d4d4; cursor: default; }
.cell.flagged  { background: #c8c8c8; }
.cell.mine-hit { background: #ff4444; }
.cell.mine-show{ background: #d4d4d4; border-color: #aaa; border-width: 1px; }
.cell.wrong    { background: #ff8888; }
.cell.flagged-wrong { background: #ffb3b3; }

/* Number colors */
.n1 { color: #0000ff; } .n2 { color: #007700; } .n3 { color: #ff0000; }
.n4 { color: #000077; } .n5 { color: #770000; } .n6 { color: #007777; }
.n7 { color: #000000; } .n8 { color: #444444; }

/* ── Hint ── */
#hint { margin-top: 10px; font-size: 0.78em; color: rgba(255,255,255,0.28); text-align: center; }
</style>
</head>
<body>

<div class="nav">
  <a href="index.html">🎮 Game Center</a>
  <span class="sep">›</span>
  <span style="color:rgba(255,255,255,0.7)">Minesweeper</span>
</div>

<h1>💣 Minesweeper</h1>

<div class="controls">
  <select id="difficulty" onchange="newGame()">
    <option value="beginner">Beginner (9×9, 10 mines)</option>
    <option value="intermediate" selected>Intermediate (16×16, 40 mines)</option>
    <option value="expert">Expert (30×16, 99 mines)</option>
  </select>
  <button onclick="newGame()">🔀 New Game</button>
</div>

<div class="statusbar">
  <span class="stat-mines" id="mine-count">💣 0</span>
  <span class="stat-face"  id="face-btn" onclick="newGame()">😊</span>
  <span class="stat-time"  id="timer">⏱ 0</span>
</div>
<div id="ms-best" style="text-align:center;font-size:.8em;color:rgba(255,255,255,0.35);margin-top:4px;min-height:1.2em;"></div>

<div id="board-wrap">
  <div id="board"></div>
</div>

<p id="hint">Left-click: reveal · Right-click or long-press: flag</p>

<script>
// ─── Config ────────────────────────────────────────────────────────────────
const LEVELS = {
  beginner:     { rows:9,  cols:9,  mines:10 },
  intermediate: { rows:16, cols:16, mines:40 },
  expert:       { rows:16, cols:30, mines:99 },
};
const NUM_COLORS = ['','n1','n2','n3','n4','n5','n6','n7','n8'];

// ─── State ────────────────────────────────────────────────────────────────
let rows, cols, totalMines;
let grid;       // grid[r][c] = {mine, adj, revealed, flagged}
let started = false;
let over    = false;
let timerInterval = null;
let elapsed = 0;
let flagCount = 0;

// ─── Init ─────────────────────────────────────────────────────────────────
function newGame() {
  clearInterval(timerInterval);
  const lvl = LEVELS[document.getElementById('difficulty').value];
  rows = lvl.rows; cols = lvl.cols; totalMines = lvl.mines;
  started = false; over = false; elapsed = 0; flagCount = 0;
  document.getElementById('face-btn').textContent  = '😊';
  document.getElementById('timer').textContent     = '⏱ 0';
  document.getElementById('mine-count').textContent = `💣 ${totalMines}`;
  buildGrid();
  renderBoard();
  const diff = document.getElementById('difficulty').value;
  const prev = parseInt(localStorage.getItem(`ms_best_${diff}`) || '0');
  document.getElementById('ms-best').textContent = prev ? `Best time (${diff}): ${prev}s` : '';
}

function buildGrid(safeR, safeC) {
  // Create empty grid
  grid = Array.from({length: rows}, () =>
    Array.from({length: cols}, () => ({mine:false, adj:0, revealed:false, flagged:false}))
  );
  // Place mines (avoid safe cell + its neighbours if provided)
  const avoid = new Set();
  if (safeR !== undefined) {
    for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
      const nr=safeR+dr, nc=safeC+dc;
      if (nr>=0&&nr<rows&&nc>=0&&nc<cols) avoid.add(nr*cols+nc);
    }
  }
  const candidates = [];
  for (let r=0;r<rows;r++) for (let c=0;c<cols;c++)
    if (!avoid.has(r*cols+c)) candidates.push(r*cols+c);
  shuffle(candidates);
  for (let i=0;i<totalMines;i++) {
    const idx = candidates[i];
    grid[Math.floor(idx/cols)][idx%cols].mine = true;
  }
  // Compute adjacency
  for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) {
    if (grid[r][c].mine) continue;
    let n=0;
    for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
      const nr=r+dr,nc=c+dc;
      if (nr>=0&&nr<rows&&nc>=0&&nc<cols&&grid[nr][nc].mine) n++;
    }
    grid[r][c].adj = n;
  }
}

function shuffle(a) {
  for (let i=a.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

// ─── Render ───────────────────────────────────────────────────────────────
function renderBoard() {
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = `repeat(${cols}, var(--csz))`;
  // Cell size: fit screen
  const maxW = Math.min(window.innerWidth - 32, 600);
  const sz = Math.max(20, Math.min(36, Math.floor((maxW - 6 - cols*2) / cols)));
  document.documentElement.style.setProperty('--csz', sz+'px');
  board.innerHTML = '';
  for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) {
    const el = document.createElement('div');
    el.className = 'cell covered';
    el.dataset.r = r; el.dataset.c = c;
    // Mouse events
    el.addEventListener('click',    onCellClick);
    el.addEventListener('contextmenu', onCellRightClick);
    // Touch events for long-press flag
    el.addEventListener('touchstart', onTouchStart, {passive:true});
    el.addEventListener('touchend',   onTouchEnd,   {passive:true});
    el.addEventListener('touchmove',  onTouchMove,  {passive:true});
    board.appendChild(el);
  }
}

function cellEl(r, c) {
  return document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
}

function updateCell(r, c) {
  const el = cellEl(r, c);
  const cell = grid[r][c];
  el.className = 'cell';
  el.textContent = '';
  if (cell.revealed) {
    if (cell.mine) {
      el.classList.add('mine-show');
      el.textContent = '💣';
    } else if (cell.adj > 0) {
      el.classList.add('revealed', NUM_COLORS[cell.adj]);
      el.textContent = cell.adj;
    } else {
      el.classList.add('revealed');
    }
  } else if (cell.flagged) {
    el.classList.add('flagged');
    el.textContent = '🚩';
  } else {
    el.classList.add('covered');
  }
}

// ─── Interaction ─────────────────────────────────────────────────────────
function onCellClick(e) {
  e.preventDefault();
  const r = +this.dataset.r, c = +this.dataset.c;
  if (over || grid[r][c].flagged || grid[r][c].revealed) return;
  if (!started) firstClick(r, c);
  reveal(r, c);
  checkWin();
}

function onCellRightClick(e) {
  e.preventDefault();
  const r = +this.dataset.r, c = +this.dataset.c;
  if (over || grid[r][c].revealed) return;
  toggleFlag(r, c);
}

// Long-press for mobile
let longPressTimer = null, touchMoved = false;
function onTouchStart(e) {
  touchMoved = false;
  longPressTimer = setTimeout(() => {
    if (!touchMoved) {
      const r = +this.dataset.r, c = +this.dataset.c;
      if (!over && !grid[r][c].revealed) { toggleFlag(r, c); }
    }
  }, 450);
}
function onTouchEnd() { clearTimeout(longPressTimer); }
function onTouchMove() { touchMoved = true; clearTimeout(longPressTimer); }

function firstClick(r, c) {
  buildGrid(r, c); // regenerate ensuring this cell is safe
  started = true;
  elapsed = 0;
  timerInterval = setInterval(() => {
    elapsed++;
    document.getElementById('timer').textContent = `⏱ ${elapsed}`;
  }, 1000);
}

function toggleFlag(r, c) {
  const cell = grid[r][c];
  cell.flagged = !cell.flagged;
  flagCount += cell.flagged ? 1 : -1;
  document.getElementById('mine-count').textContent = `💣 ${totalMines - flagCount}`;
  updateCell(r, c);
}

function reveal(r, c) {
  const cell = grid[r][c];
  if (cell.revealed || cell.flagged) return;
  cell.revealed = true;
  if (cell.mine) {
    // Hit a mine
    cell.revealed = true;
    updateCell(r, c);
    cellEl(r, c).classList.remove('mine-show');
    cellEl(r, c).classList.add('mine-hit');
    cellEl(r, c).textContent = '💣';
    gameOver(false);
    return;
  }
  updateCell(r, c);
  // Flood fill for zeros
  if (cell.adj === 0) {
    for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
      const nr=r+dr,nc=c+dc;
      if (nr>=0&&nr<rows&&nc>=0&&nc<cols) reveal(nr,nc);
    }
  }
}

function checkWin() {
  let unrevealed = 0;
  for (let r=0;r<rows;r++) for (let c=0;c<cols;c++)
    if (!grid[r][c].revealed && !grid[r][c].mine) unrevealed++;
  if (unrevealed === 0) {
    gameOver(true);
  }
}

function gameOver(win) {
  over = true;
  clearInterval(timerInterval);
  document.getElementById('face-btn').textContent = win ? '😎' : '😵';
  if (!win) {
    // Reveal all mines
    for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) {
      const cell = grid[r][c];
      if (cell.mine && !cell.flagged) { cell.revealed = true; updateCell(r,c); }
      // Mark wrong flags
      if (cell.flagged && !cell.mine) {
        const el = cellEl(r,c);
        el.className = 'cell flagged-wrong';
        el.textContent = '❌';
      }
    }
  } else {
    // Flag all remaining mines
    for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) {
      if (grid[r][c].mine && !grid[r][c].flagged) { toggleFlag(r,c); }
    }
    // Save best time
    const diff = document.getElementById('difficulty').value;
    const key  = `ms_best_${diff}`;
    const prev = parseInt(localStorage.getItem(key) || '0');
    if (!prev || elapsed < prev) {
      localStorage.setItem(key, elapsed);
      document.getElementById('ms-best').textContent = `🏆 Best time (${diff}): ${elapsed}s`;
    } else {
      document.getElementById('ms-best').textContent = `Best time (${diff}): ${prev}s`;
    }
  }
}

// ─── Handle resize ────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const maxW = Math.min(window.innerWidth - 32, 600);
  const sz = Math.max(20, Math.min(36, Math.floor((maxW - 6 - cols*2) / cols)));
  document.documentElement.style.setProperty('--csz', sz+'px');
});

// ─── Start ────────────────────────────────────────────────────────────────
newGame();
</script>
</body>
</html>
