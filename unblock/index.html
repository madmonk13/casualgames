<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Unblock</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: #0f1923;
  color: #c8d8e8;
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.nav {
  width: 100%;
  padding: 8px 16px;
  display: flex;
  gap: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.nav a { color: rgba(255,255,255,0.45); text-decoration: none; font-size: 0.9em; transition: color .15s; }
.nav a:hover { color: #f0c040; }

main {
  width: 100%;
  max-width: 480px;
  padding: 14px 12px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  touch-action: none;
}

h1 {
  font-size: clamp(1.4em, 5vw, 2em);
  font-weight: 900;
  color: #f0c040;
  letter-spacing: -0.5px;
}

.stats {
  display: flex;
  gap: 24px;
}
.stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.stat-label { font-size: 0.6em; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }
.stat-val   { font-size: 1.1em; font-weight: 700; color: #f0e0a0; }

.controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.diff-btn {
  padding: 6px 14px;
  font-size: 0.85em;
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  background: transparent;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  transition: all .15s;
}
.diff-btn.active, .diff-btn:hover { border-color: #f0c040; color: #f0c040; }
.btn {
  padding: 6px 16px;
  font-size: 0.85em;
  border: 2px solid #c8960a;
  border-radius: 20px;
  background: #c8960a;
  color: #1a0e00;
  font-weight: bold;
  cursor: pointer;
  transition: all .15s;
}
.btn:hover { background: #f0c040; border-color: #f0c040; }

#canvas {
  display: block;
  border-radius: 10px;
  cursor: pointer;
  touch-action: none;
}

.hint { font-size: 0.78em; color: rgba(255,255,255,0.3); }

/* Overlay */
#overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.72);
  align-items: center;
  justify-content: center;
  z-index: 100;
}
#overlay.show { display: flex; }
#overlay-box {
  background: #1a2535;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  padding: 28px 32px;
  text-align: center;
  max-width: 300px;
}
#overlay-box h2 { font-size: 2.2em; margin-bottom: 10px; }
#overlay-box p  { margin-bottom: 6px; color: rgba(255,255,255,.7); }
#ol-best { font-size: .85em; color: rgba(255,255,255,.4); margin-bottom: 18px !important; }
</style>
</head>
<body>

<nav class="nav">
  <a href="../index.html">⬅ Games</a>
</nav>

<main>
  <h1>Unblock</h1>

  <div class="stats">
    <div class="stat">
      <span class="stat-label">Moves</span>
      <span class="stat-val" id="moves">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Puzzle</span>
      <span class="stat-val" id="puzzle-num">1</span>
    </div>
    <div class="stat">
      <span class="stat-label">Best</span>
      <span class="stat-val" id="best">—</span>
    </div>
  </div>

  <div class="controls">
    <button class="diff-btn active" id="btn-easy"   onclick="setDiff('easy')">Easy</button>
    <button class="diff-btn"        id="btn-medium" onclick="setDiff('medium')">Medium</button>
    <button class="diff-btn"        id="btn-hard"   onclick="setDiff('hard')">Hard</button>
    <button class="btn" onclick="nextPuzzle()">Next ▶</button>
    <button class="btn" onclick="resetPuzzle()">↺ Reset</button>
  </div>

  <canvas id="canvas"></canvas>
  <p class="hint">Slide cars to free the red car · exit is on the right</p>
</main>

<div id="overlay">
  <div id="overlay-box">
    <h2>🎉 Escaped!</h2>
    <p id="ol-moves"></p>
    <p id="ol-best"></p>
    <button class="btn" style="margin-top:8px" onclick="nextPuzzle(); document.getElementById('overlay').classList.remove('show')">Next Puzzle</button>
  </div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const GRID = 6; // 6×6 grid

// ── Procedural puzzle generator ───────────────────────────────────────────────
// Seeded PRNG (xorshift32) — same seed → same puzzle every time
function mkRng(seed) {
  let s = (seed ^ 0xdeadbeef) >>> 0;
  return () => { s=(s^(s<<13))>>>0; s=(s^(s>>17))>>>0; s=(s^(s<<5))>>>0; return s/4294967296; };
}

const DIFF_CONFIG = {
  easy:   { minMoves: 3,  maxMoves: 6,  numCars: 4, bfsCap:  5000 },
  medium: { minMoves: 6,  maxMoves: 11, numCars: 6, bfsCap: 15000 },
  hard:   { minMoves: 8,  maxMoves: 15, numCars: 8, bfsCap: 20000 },
};

function _buildGrid(rawCars) {
  const g = Array.from({length:GRID}, () => new Array(GRID).fill(-1));
  for (let i = 0; i < rawCars.length; i++) {
    const [col, row, len, horiz] = rawCars[i];
    for (let k = 0; k < len; k++) {
      const c = horiz ? col+k : col, r = horiz ? row : row+k;
      if (c<0||c>=GRID||r<0||r>=GRID||g[r][c]!==-1) return null;
      g[r][c] = i;
    }
  }
  return g;
}

function _solvePuzzle(initRaw, cap) {
  if (!_buildGrid(initRaw)) return -1;
  const key = cars => cars.map(c=>c[0]+','+c[1]).join('|');
  const queue = [[initRaw, 0]], vis = new Set([key(initRaw)]);
  let h = 0;
  while (h < queue.length) {
    if (vis.size > cap) return -1;
    const [cars, m] = queue[h++];
    if (cars[0][0] + cars[0][2] >= GRID) return m;
    const g = _buildGrid(cars);
    for (let i = 0; i < cars.length; i++) {
      const [col, row, len, horiz] = cars[i];
      const T = (nc, nr) => { const n=cars.map((c,j)=>j===i?[nc,nr,len,horiz]:c),k=key(n); if(!vis.has(k)){vis.add(k);queue.push([n,m+1]);} };
      if (horiz) {
        for (let d=1;;d++) { const rc=col+len+d-1; if(rc>=GRID){if(i===0)return m+1;break;} if(g[row][rc]!==-1)break; T(col+d,row); }
        for (let d=1;;d++) { const lc=col-d; if(lc<0)break; if(g[row][lc]!==-1)break; T(col-d,row); }
      } else {
        for (let d=1;;d++) { const dr=row+len+d-1; if(dr>=GRID)break; if(g[dr][col]!==-1)break; T(col,row+d); }
        for (let d=1;;d++) { const ur=row-d; if(ur<0)break; if(g[ur][col]!==-1)break; T(col,row-d); }
      }
    }
  }
  return -1;
}

function _tryPlace(g, len, horiz, rng) {
  const cands = [];
  if (horiz) {
    for (let r=0; r<GRID; r++) for (let c=0; c<=GRID-len; c++) {
      let ok=true; for (let k=0;k<len&&ok;k++) if(g[r][c+k]!==-1)ok=false;
      if (ok) cands.push([c,r,len,1]);
    }
  } else {
    for (let c=0; c<GRID; c++) for (let r=0; r<=GRID-len; r++) {
      let ok=true; for (let k=0;k<len&&ok;k++) if(g[r+k][c]!==-1)ok=false;
      if (ok) cands.push([c,r,len,0]);
    }
  }
  return cands.length ? cands[Math.floor(rng()*cands.length)] : null;
}

function generatePuzzle(d, levelNum) {
  const { minMoves, maxMoves, numCars, bfsCap } = DIFF_CONFIG[d];
  const seed = (d==='easy'?1:d==='medium'?2:3) * 1000000 + levelNum;
  const rng = mkRng(seed);
  for (let attempt = 0; attempt < 5000; attempt++) {
    const raw = [[Math.floor(rng()*3), 2, 2, 1]];
    let g = _buildGrid(raw), ok = true;
    for (let n=1; n<numCars && ok; n++) {
      const len=rng()<0.4?3:2, horiz=rng()<0.5?1:0;
      const car = _tryPlace(g, len, horiz, rng);
      if (!car) { ok=false; break; }
      raw.push(car);
      const ng = _buildGrid(raw);
      if (!ng) { ok=false; break; }
      g = ng;
    }
    if (!ok) continue;
    const m = _solvePuzzle(raw, bfsCap);
    if (m >= minMoves && m <= maxMoves) return raw;
  }
  // Fallback: simple valid puzzle
  return [[0,2,2,1],[3,2,2,0]];
}

// Car colors (index 0 = red car, rest cycle through palette)
const CAR_COLORS = [
  '#e53935', // red — target car
  '#1e88e5','#43a047','#fb8c00','#8e24aa',
  '#00acc1','#f4511e','#6d4c41','#3949ab',
  '#00897b','#e91e63','#fdd835','#546e7a',
];

// ── State ────────────────────────────────────────────────────────────────────
let diff = 'easy';
let levelNums = { easy: 1, medium: 1, hard: 1 };
let currentRaw = [];  // raw array form of current puzzle (for reset)
let _nextCache = null; // pre-generated next puzzle
let cars = [];       // current mutable state: [{col,row,len,horiz}]
let initial = [];    // snapshot for reset
let moves = 0;
let won = false;
let CS;              // cell size in px

// Drag state
let drag = null; // {carIdx, axis, startCell, startCar, startPx}

// ── Canvas ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

// ── Layout ───────────────────────────────────────────────────────────────────
function calcSize() {
  CS = Math.floor(Math.min(window.innerWidth - 24, 420) / GRID);
  canvas.width  = GRID * CS;
  canvas.height = GRID * CS;
  canvas.style.width  = canvas.width  + 'px';
  canvas.style.height = canvas.height + 'px';
}

// ── Puzzle load ───────────────────────────────────────────────────────────────
function loadPuzzle(raw) {
  currentRaw = raw;
  cars = raw.map(([col, row, len, horiz]) => ({ col, row, len, horiz: !!horiz }));
  initial = cars.map(c => ({...c}));
  moves = 0;
  won = false;
  document.getElementById('moves').textContent = '0';
  document.getElementById('puzzle-num').textContent = levelNums[diff];
  updateBestDisplay();
  render();
  saveState();
  // Pre-generate next puzzle in background
  _nextCache = null;
  setTimeout(() => { _nextCache = generatePuzzle(diff, levelNums[diff] + 1); }, 50);
}

function resetPuzzle() {
  cars = initial.map(c => ({...c}));
  moves = 0;
  won = false;
  document.getElementById('moves').textContent = '0';
  render();
}

async function nextPuzzle() {
  if (_nextCache) {
    levelNums[diff]++;
    loadPuzzle(_nextCache);
  } else {
    const btn = document.querySelector('.btn[onclick*="nextPuzzle"]');
    const orig = btn.textContent;
    btn.textContent = '⟳';
    btn.disabled = true;
    await new Promise(r => setTimeout(r, 16));
    levelNums[diff]++;
    const raw = generatePuzzle(diff, levelNums[diff]);
    btn.textContent = orig;
    btn.disabled = false;
    loadPuzzle(raw);
  }
}

function setDiff(d) {
  diff = d;
  _nextCache = null;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${d}`).classList.add('active');
  loadPuzzle(generatePuzzle(diff, levelNums[diff]));
}

// ── Collision ─────────────────────────────────────────────────────────────────
function occupiedCells(car) {
  const cells = [];
  for (let i = 0; i < car.len; i++) {
    cells.push(car.horiz ? [car.col + i, car.row] : [car.col, car.row + i]);
  }
  return cells;
}

function buildGrid(excludeIdx = -1) {
  const g = Array.from({length: GRID}, () => new Array(GRID).fill(-1));
  cars.forEach((car, i) => {
    if (i === excludeIdx) return;
    for (let k = 0; k < car.len; k++) {
      const c = car.horiz ? car.col + k : car.col;
      const r = car.horiz ? car.row : car.row + k;
      if (c >= 0 && c < GRID && r >= 0 && r < GRID) g[r][c] = i;
    }
  });
  return g;
}

function canMoveTo(carIdx, newCol, newRow) {
  const car = cars[carIdx];
  const g = buildGrid(carIdx);
  for (let k = 0; k < car.len; k++) {
    const c = car.horiz ? newCol + k : newCol;
    const r = car.horiz ? newRow : newRow + k;
    if (c < 0 || r < 0 || r >= GRID) return false;
    // Allow the red car (idx 0) to exit right
    if (carIdx === 0 && car.horiz && c >= GRID) continue;
    if (c >= GRID) return false;
    if (g[r][c] !== -1) return false;
  }
  return true;
}

function minMax(carIdx) {
  const car = cars[carIdx];
  const g = buildGrid(carIdx);
  let lo = 0, hi = GRID - car.len;
  if (car.horiz) {
    // scan left
    for (let c = car.col - 1; c >= 0; c--) {
      if (g[car.row][c] !== -1) { lo = c + 1; break; }
    }
    // scan right — for red car allow exit beyond GRID
    const limit = carIdx === 0 ? GRID : GRID - car.len;
    hi = limit;
    for (let c = car.col + car.len; c < GRID; c++) {
      if (g[car.row][c] !== -1) { hi = c - car.len; break; }
    }
  } else {
    for (let r = car.row - 1; r >= 0; r--) {
      if (g[r][car.col] !== -1) { lo = r + 1; break; }
    }
    for (let r = car.row + car.len; r < GRID; r++) {
      if (g[r][car.col] !== -1) { hi = r - car.len; break; }
    }
  }
  return [lo, hi];
}

// ── Rendering ─────────────────────────────────────────────────────────────────
const C_BG      = '#0f1923';
const C_GRID    = '#1a2a3a';
const C_EXIT    = 'rgba(240,192,64,0.18)';

function render() {
  ctx.fillStyle = C_BG;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = C_GRID;
  ctx.lineWidth = 1;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i*CS, 0); ctx.lineTo(i*CS, GRID*CS); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i*CS); ctx.lineTo(GRID*CS, i*CS); ctx.stroke();
  }

  // Exit highlight (right edge, row 2)
  ctx.fillStyle = C_EXIT;
  ctx.fillRect((GRID-1)*CS + 1, 2*CS + 1, CS - 1, CS - 1);

  // Exit arrow
  const ex = GRID*CS - 4, ey = 2*CS + CS/2;
  ctx.fillStyle = 'rgba(240,192,64,0.6)';
  ctx.beginPath();
  ctx.moveTo(ex - 8, ey - 6);
  ctx.lineTo(ex,     ey);
  ctx.lineTo(ex - 8, ey + 6);
  ctx.closePath();
  ctx.fill();

  // Cars
  const PAD = Math.max(3, Math.round(CS * 0.07));
  const RAD = Math.max(4, Math.round(CS * 0.14));

  cars.forEach((car, i) => {
    const x = car.col * CS + PAD;
    const y = car.row * CS + PAD;
    const w = car.horiz ? car.len * CS - PAD*2 : CS - PAD*2;
    const h = car.horiz ? CS - PAD*2 : car.len * CS - PAD*2;

    const color = CAR_COLORS[i % CAR_COLORS.length];

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    roundRect(x+2, y+2, w, h, RAD);
    ctx.fill();

    // Body
    ctx.fillStyle = color;
    roundRect(x, y, w, h, RAD);
    ctx.fill();

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    if (car.horiz) {
      roundRect(x + 4, y + 4, w - 8, h * 0.4, RAD * 0.6);
    } else {
      roundRect(x + 4, y + 4, w * 0.4, h - 8, RAD * 0.6);
    }
    ctx.fill();

    // Red car marker stripe
    if (i === 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      if (car.horiz) {
        roundRect(x + w*0.6, y + PAD, w*0.3, h - PAD*2, 2);
      } else {
        roundRect(x + PAD, y + h*0.6, w - PAD*2, h*0.3, 2);
      }
      ctx.fill();
    }
  });

  // Win flash overlay
  if (won) {
    ctx.fillStyle = 'rgba(240,192,64,0.12)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ── Input ─────────────────────────────────────────────────────────────────────
function pxToCell(px) { return Math.floor(px / CS); }

function carAt(col, row) {
  return cars.findIndex(car => {
    for (let k = 0; k < car.len; k++) {
      const c = car.horiz ? car.col + k : car.col;
      const r = car.horiz ? car.row : car.row + k;
      if (c === col && r === row) return true;
    }
    return false;
  });
}

function getXY(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return [(src.clientX - rect.left) * (canvas.width / rect.width),
          (src.clientY - rect.top)  * (canvas.height / rect.height)];
}

function onPointerDown(e) {
  if (won) return;
  e.preventDefault();
  const [px, py] = getXY(e);
  const col = pxToCell(px), row = pxToCell(py);
  const idx = carAt(col, row);
  if (idx === -1) return;
  drag = {
    carIdx: idx,
    startPx: cars[idx].horiz ? px : py,
    startCell: cars[idx].horiz ? cars[idx].col : cars[idx].row,
    startCar: {...cars[idx]},
  };
}

function onPointerMove(e) {
  if (!drag || won) return;
  e.preventDefault();
  const [px, py] = getXY(e);
  const car = cars[drag.carIdx];
  const curPx = car.horiz ? px : py;
  const delta = Math.round((curPx - drag.startPx) / CS);
  const [lo, hi] = minMax(drag.carIdx);
  const newPos = Math.max(lo, Math.min(hi, drag.startCell + delta));

  if (car.horiz) car.col = newPos;
  else            car.row = newPos;

  render();
}

function onPointerUp(e) {
  if (!drag) return;
  e.preventDefault();
  const car = cars[drag.carIdx];
  const moved = car.horiz
    ? car.col !== drag.startCar.col
    : car.row !== drag.startCar.row;

  if (moved) {
    moves++;
    document.getElementById('moves').textContent = moves;

    // Check win: red car col + len reaches the exit (>= GRID)
    if (drag.carIdx === 0 && car.col + car.len >= GRID) {
      car.col = GRID - car.len + 2; // animate slightly off-screen
      won = true;
      render();
      onWin();
    } else {
      render();
      saveState();
    }
  }
  drag = null;
}

canvas.addEventListener('mousedown',  onPointerDown);
canvas.addEventListener('mousemove',  onPointerMove);
canvas.addEventListener('mouseup',    onPointerUp);
canvas.addEventListener('mouseleave', onPointerUp);
canvas.addEventListener('touchstart', onPointerDown, { passive: false });
canvas.addEventListener('touchmove',  onPointerMove, { passive: false });
canvas.addEventListener('touchend',   onPointerUp,   { passive: false });

// ── Win ───────────────────────────────────────────────────────────────────────
function onWin() {
  const key = `unblock_best_${diff}_${levelNums[diff]}`;
  const prev = parseInt(localStorage.getItem(key));
  const isNew = isNaN(prev) || moves < prev;
  if (isNew) localStorage.setItem(key, moves);

  document.getElementById('ol-moves').textContent  = `Moves: ${moves}`;
  document.getElementById('ol-best').textContent = isNew
    ? '🏆 New best!'
    : `Best: ${prev} moves`;
  updateBestDisplay();

  setTimeout(() => document.getElementById('overlay').classList.add('show'), 400);
  saveState();
}

function updateBestDisplay() {
  const key = `unblock_best_${diff}_${levelNums[diff]}`;
  const b = parseInt(localStorage.getItem(key));
  document.getElementById('best').textContent = isNaN(b) ? '—' : b;
}

// ── Persistence ───────────────────────────────────────────────────────────────
function saveState() {
  try {
    localStorage.setItem('unblock_state', JSON.stringify({ diff, levelNums, currentRaw, cars, moves, won }));
  } catch(e) {}
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('unblock_state'));
    if (!s || !s.levelNums) return false;
    diff = s.diff;
    levelNums = s.levelNums;
    currentRaw = s.currentRaw || [];
    cars = s.cars;
    moves = s.moves;
    won = s.won;
    initial = currentRaw.map(([col, row, len, horiz]) => ({ col, row, len, horiz: !!horiz }));
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-${diff}`).classList.add('active');
    document.getElementById('moves').textContent = moves;
    document.getElementById('puzzle-num').textContent = levelNums[diff];
    updateBestDisplay();
    // Pre-generate next puzzle in background
    setTimeout(() => { _nextCache = generatePuzzle(diff, levelNums[diff] + 1); }, 50);
    return true;
  } catch(e) { return false; }
}

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => { calcSize(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
calcSize();
if (!loadState()) {
  loadPuzzle(generatePuzzle(diff, levelNums[diff]));
} else {
  render();
}
</script>
</body>
</html>
