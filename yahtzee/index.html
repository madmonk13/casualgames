<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎲 Yahtzee</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0f1923;
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  color: #fff;
}

/* ── Header ── */
header {
  background: #0a1018;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
header a { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.9em; }
header a:hover { color: rgba(255,255,255,0.8); }
header h1 { font-size: 1.2em; font-weight: 700; color: #f0e0a0; flex: 1; }
#total-score { font-size: 1.3em; font-weight: 800; color: #f0c040; }

/* ── Two-column layout ── */
main {
  max-width: 460px;
  margin: 0 auto;
  padding: 12px 10px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

/* ── Left: Scorecard ── */
.score-panel { flex: 1; min-width: 0; }

.scorecard {
  background: #1a2534;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.06);
}
.section-header {
  background: #0f1923;
  padding: 4px 10px;
  font-size: 0.62em;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
}
.score-row {
  display: flex;
  align-items: center;
  padding: 7px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  gap: 6px;
  transition: background 0.1s;
}
.score-row:last-child { border-bottom: none; }
.score-row.scoreable { cursor: pointer; }
.score-row.scoreable:hover { background: rgba(240,192,64,0.12); }
.score-row .cat-name { flex: 1; font-size: 0.82em; color: #e8e0d0; }
.score-row .cat-val {
  font-size: 0.88em; font-weight: 700;
  min-width: 26px; text-align: right; flex-shrink: 0;
}
.score-row.scored .cat-val { color: #f0e0a0; }
.score-row.scoreable .cat-val { color: rgba(240,192,64,0.7); }
.score-row.scoreable .cat-val.zero { color: rgba(255,80,80,0.6); }
.score-row .cat-val.empty { color: rgba(255,255,255,0.15); }

.summary-row {
  display: flex; align-items: center;
  padding: 5px 10px;
  background: rgba(240,192,64,0.04);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 0.72em;
}
.summary-row .label { flex: 1; color: rgba(255,255,255,0.38); }
.summary-row .val { font-weight: 700; min-width: 26px; text-align: right; }

.grand-total-row {
  display: flex; align-items: center;
  padding: 8px 10px;
  background: rgba(240,192,64,0.07);
  border-top: 1px solid rgba(240,192,64,0.15);
  font-weight: 800;
}
.grand-total-row .label { flex: 1; color: #f0e0a0; font-size: 0.85em; }
.grand-total-row .val { font-size: 1.1em; color: #f0c040; min-width: 26px; text-align: right; }

/* ── Right: Dice panel ── */
.dice-panel {
  width: 106px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  background: #1e7a32;
  border-radius: 14px;
  padding: 10px 8px 12px;
  border: 1px solid rgba(255,255,255,0.06);
}

/* Die wrapper */
.die-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }

/* Die: CSS radial-gradient dot faces */
.die {
  width: 62px; height: 62px;
  border-radius: 10px;
  border: 2px solid rgba(255,255,255,0.22);
  background-color: #c8392b;
  background-image: none;
  cursor: pointer;
  transition: border-color 0.12s, transform 0.1s;
  user-select: none;
}
.die:active { transform: scale(0.9); }
.die.hold { background-color: #7b1a11; border-color: #111; }

/* Dot patterns */
.die_1 { background-image: radial-gradient(white 15%, black 16%, gray 17%, transparent 18%); }
.die_2 { background-image:
  radial-gradient(circle at 20% 20%, white 10%, black 11%, gray 12%, transparent 12%),
  radial-gradient(circle at 80% 80%, white 10%, black 11%, gray 12%, transparent 12%); }
.die_3 { background-image:
  radial-gradient(circle at 20% 20%, white 10%, black 11%, gray 12%, transparent 12%),
  radial-gradient(white 15%, black 16%, gray 17%, transparent 17%),
  radial-gradient(circle at 80% 80%, white 10%, black 11%, gray 12%, transparent 12%); }
.die_4 { background-image:
  radial-gradient(circle at 20% 20%, white 10%, black 11%, gray 12%, transparent 12%),
  radial-gradient(circle at 80% 20%, white 10%, black 11%, gray 12%, transparent 12%),
  radial-gradient(circle at 20% 80%, white 10%, black 11%, gray 12%, transparent 12%),
  radial-gradient(circle at 80% 80%, white 10%, black 11%, gray 12%, transparent 12%); }
.die_5 { background-image:
  radial-gradient(circle at 20% 20%, white 10%, black 11%, gray 12%, transparent 12%),
  radial-gradient(circle at 80% 20%, white 10%, black 11%, gray 12%, transparent 12%),
  radial-gradient(white 15%, black 16%, gray 17%, transparent 18%),
  radial-gradient(circle at 20% 80%, white 10%, black 11%, gray 12%, transparent 12%),
  radial-gradient(circle at 80% 80%, white 10%, black 11%, gray 12%, transparent 12%); }
.die_6 { background-image:
  radial-gradient(circle at 20% 20%, white 10%, black 11%, gray 12%, transparent 12%),
  radial-gradient(circle at 80% 20%, white 10%, black 11%, gray 12%, transparent 12%),
  radial-gradient(circle at 20% 50%, white 12%, black 13%, gray 14%, transparent 14%),
  radial-gradient(circle at 80% 50%, white 12%, black 13%, gray 14%, transparent 14%),
  radial-gradient(circle at 20% 80%, white 10%, black 11%, gray 12%, transparent 12%),
  radial-gradient(circle at 80% 80%, white 10%, black 11%, gray 12%, transparent 12%); }

/* Hold label */
.hold-label {
  font-size: 0.58em; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: transparent; height: 10px;
  transition: color 0.12s;
}
.die-wrap.held .hold-label { color: rgba(255,255,255,0.85); }

/* Roll animation */
@keyframes rolling {
  0%   { transform: rotate(0deg)   scale(1); }
  40%  { transform: rotate(320deg) scale(0.88); }
  100% { transform: rotate(720deg) scale(1); }
}
.die.rolling { animation: rolling 0.6s ease-in-out; }

/* Roll button */
.btn-roll {
  width: 88px; padding: 10px 0;
  background: linear-gradient(135deg, #f0c040, #d4a010);
  color: #2a1800; font-weight: 800; font-size: 0.9em;
  border: none; border-radius: 8px; cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  margin-top: 2px;
}
.btn-roll:hover:not(:disabled) { background: linear-gradient(135deg, #ffe060, #e8b820); transform: translateY(-1px); }
.btn-roll:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.28); cursor: default; transform: none; }

.roll-count { font-size: 0.67em; color: rgba(255,255,255,0.5); text-align: center; min-height: 12px; }

.btn-new {
  width: 88px; padding: 6px 0;
  background: rgba(0,0,0,0.2);
  color: rgba(255,255,255,0.45); font-weight: 700; font-size: 0.72em;
  border: 1px solid rgba(255,255,255,0.12); border-radius: 7px; cursor: pointer;
}
.btn-new:hover { background: rgba(0,0,0,0.35); color: rgba(255,255,255,0.8); }

/* ── Game-over overlay ── */
.game-over {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.78); z-index: 100;
  align-items: center; justify-content: center;
}
.game-over.show { display: flex; }
.game-over-box {
  background: #1e2d3d; border-radius: 20px; padding: 36px 40px;
  text-align: center; max-width: 300px; width: 90%;
  border: 1px solid rgba(240,192,64,0.3);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.game-over-box h2 { font-size: 1.8em; color: #f0c040; margin-bottom: 4px; }
.game-over-box .final-score { font-size: 3.5em; font-weight: 900; color: #fff; margin: 16px 0 8px; }
.game-over-box .rating { color: rgba(255,255,255,0.5); font-size: 0.95em; margin-bottom: 24px; }
.btn-new-game {
  padding: 12px 36px;
  background: linear-gradient(135deg, #f0c040, #d4a010);
  color: #2a1800; font-weight: 800; font-size: 1.05em;
  border: none; border-radius: 10px; cursor: pointer;
}
.btn-new-game:hover { background: linear-gradient(135deg, #ffe060, #e8b820); }
</style>
</head>
<body>

<header>
  <a href="../index.html">← Games</a>
  <h1>🎲 Yahtzee Solitaire</h1>
  <div id="total-score">0</div>
</header>

<div class="game-over" id="game-over">
  <div class="game-over-box">
    <h2>Game Over!</h2>
    <div class="final-score" id="final-score">0</div>
    <div class="rating" id="rating"></div>
    <div id="yahtzee-best-msg" style="color:rgba(255,255,255,0.4);font-size:.85em;margin-bottom:8px;min-height:1.2em;"></div>
    <button class="btn-new-game" onclick="newGame()">🎲 Play Again</button>
  </div>
</div>

<main>
  <!-- Left: Scorecard -->
  <div class="score-panel">
    <div class="scorecard" id="scorecard"></div>
  </div>

  <!-- Right: Dice panel -->
  <div class="dice-panel">
    <div id="dice-area"></div>
    <button class="btn-roll" id="btn-roll" onclick="rollDice()">Roll</button>
    <div class="roll-count" id="roll-count">3 rolls</div>
    <button class="btn-new" onclick="newGame()">New Game</button>
  </div>
</main>

<script>
// ── Categories ──
const UPPER_CATS = ['ones','twos','threes','fours','fives','sixes'];
const LOWER_CATS = ['three_of_a_kind','four_of_a_kind','full_house','small_straight','large_straight','yahtzee','chance'];
const ALL_CATS   = [...UPPER_CATS, ...LOWER_CATS];

const CAT_INFO = {
  ones:            { name: 'Ones' },
  twos:            { name: 'Twos' },
  threes:          { name: 'Threes' },
  fours:           { name: 'Fours' },
  fives:           { name: 'Fives' },
  sixes:           { name: 'Sixes' },
  three_of_a_kind: { name: '3 of a Kind' },
  four_of_a_kind:  { name: '4 of a Kind' },
  full_house:      { name: 'Full House' },
  small_straight:  { name: 'Sm. Straight' },
  large_straight:  { name: 'Lg. Straight' },
  yahtzee:         { name: 'Yahtzee!' },
  chance:          { name: 'Chance' }
};

// ── State ──
let dice = [0,0,0,0,0];
let held = [false,false,false,false,false];
let rollsLeft = 3;
let rolled = false;
let scores = {};
let yahtzeeBonus = 0;

// ── Init ──
function newGame() {
  dice = [0,0,0,0,0];
  held = [false,false,false,false,false];
  rollsLeft = 3;
  rolled = false;
  scores = {};
  yahtzeeBonus = 0;
  document.getElementById('game-over').classList.remove('show');
  renderDice();
  renderScorecard();
  updateRollBtn();
  updateTotal();
}

// ── Dice rendering ──
function renderDice() {
  const area = document.getElementById('dice-area');
  area.innerHTML = '';
  dice.forEach((val, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'die-wrap' + (held[i] ? ' held' : '');

    const die = document.createElement('div');
    const faceClass = (rolled && val) ? ' die_' + val : '';
    die.className = 'die' + faceClass + (held[i] ? ' hold' : '');
    die.addEventListener('click', () => toggleHold(i));

    const lbl = document.createElement('div');
    lbl.className = 'hold-label';
    lbl.textContent = 'HOLD';

    wrap.appendChild(die);
    wrap.appendChild(lbl);
    area.appendChild(wrap);
  });
}

function toggleHold(i) {
  if (!rolled || rollsLeft === 0) return;
  held[i] = !held[i];
  renderDice();
}

// ── Roll ──
function rollDice() {
  if (rollsLeft <= 0) return;
  rolled = true;
  rollsLeft--;

  // Animate non-held dice, then update values
  const dieEls = document.querySelectorAll('.die');
  dice.forEach((_, i) => {
    if (!held[i]) {
      dice[i] = Math.ceil(Math.random() * 6);
      dieEls[i]?.classList.add('rolling');
    }
  });

  setTimeout(() => {
    renderDice();
    renderScorecard();
    updateRollBtn();
    updateTotal();
  }, 620);
}

function updateRollBtn() {
  const btn = document.getElementById('btn-roll');
  const cnt = document.getElementById('roll-count');
  if (rollsLeft <= 0) {
    btn.disabled = true;
    btn.textContent = 'No rolls';
    cnt.textContent = 'Pick a score ↑';
  } else if (!rolled) {
    btn.disabled = false;
    btn.textContent = 'Roll';
    cnt.textContent = '3 rolls';
  } else {
    btn.disabled = false;
    btn.textContent = 'Roll';
    cnt.textContent = rollsLeft + (rollsLeft === 1 ? ' roll left' : ' rolls left');
  }
}

// ── Score calculation ──
function calcScore(cat, d) {
  const counts = Array(7).fill(0);
  d.forEach(v => counts[v]++);
  const sum = d.reduce((a, b) => a + b, 0);
  const max = Math.max(...counts.slice(1));

  switch (cat) {
    case 'ones':   return counts[1] * 1;
    case 'twos':   return counts[2] * 2;
    case 'threes': return counts[3] * 3;
    case 'fours':  return counts[4] * 4;
    case 'fives':  return counts[5] * 5;
    case 'sixes':  return counts[6] * 6;
    case 'three_of_a_kind': return max >= 3 ? sum : 0;
    case 'four_of_a_kind':  return max >= 4 ? sum : 0;
    case 'full_house': {
      const vals = counts.slice(1).filter(c => c > 0);
      return (vals.length === 2 && vals.includes(2) && vals.includes(3)) ? 25 : 0;
    }
    case 'small_straight': {
      const u = [...new Set(d)].sort((a,b) => a-b).join('');
      return (u.includes('1234') || u.includes('2345') || u.includes('3456')) ? 30 : 0;
    }
    case 'large_straight': {
      const u = [...new Set(d)].sort((a,b) => a-b).join('');
      return (u === '12345' || u === '23456') ? 40 : 0;
    }
    case 'yahtzee': return max === 5 ? 50 : 0;
    case 'chance':  return sum;
    default: return 0;
  }
}

function scoreCategory(cat) {
  if (scores[cat] !== undefined || !rolled) return;

  if (calcScore('yahtzee', dice) === 50 && scores['yahtzee'] === 50) yahtzeeBonus += 100;

  scores[cat] = calcScore(cat, dice);
  held = [false,false,false,false,false];
  rollsLeft = 3;
  rolled = false;
  renderDice();
  renderScorecard();
  updateRollBtn();
  updateTotal();

  if (ALL_CATS.every(c => scores[c] !== undefined)) {
    const total = getTotalScore();
    document.getElementById('final-score').textContent = total;
    document.getElementById('rating').textContent = rateScore(total);
    const yBest = parseInt(localStorage.getItem('yahtzee_best') || '0');
    if (total > yBest) {
      localStorage.setItem('yahtzee_best', total);
      document.getElementById('yahtzee-best-msg').textContent = yBest ? '🏆 New best score!' : 'First game recorded!';
    } else {
      document.getElementById('yahtzee-best-msg').textContent = yBest ? `Best: ${yBest}` : '';
    }
    setTimeout(() => document.getElementById('game-over').classList.add('show'), 400);
  }
}

function rateScore(s) {
  if (s >= 400) return '🏆 Legendary!';
  if (s >= 300) return '⭐ Excellent!';
  if (s >= 250) return '👏 Really nice!';
  if (s >= 200) return '🎲 Solid game!';
  if (s >= 150) return 'Not bad!';
  return 'Tough luck — try again!';
}

function getUpperTotal() { return UPPER_CATS.reduce((s,c) => s + (scores[c]||0), 0); }
function getUpperBonus()  { return getUpperTotal() >= 63 ? 35 : 0; }
function getLowerTotal()  { return LOWER_CATS.reduce((s,c) => s + (scores[c]||0), 0); }
function getTotalScore()  { return getUpperTotal() + getUpperBonus() + getLowerTotal() + yahtzeeBonus; }
function updateTotal()    { document.getElementById('total-score').textContent = getTotalScore(); }

// ── Scorecard ──
function renderScorecard() {
  const sc = document.getElementById('scorecard');
  sc.innerHTML = '';

  addSectionHeader(sc, 'Upper');
  UPPER_CATS.forEach(cat => sc.appendChild(makeScoreRow(cat)));

  const upperTotal  = getUpperTotal();
  const bonusEarned = upperTotal >= 63;
  const needed      = Math.max(0, 63 - upperTotal);

  const bonusRow = document.createElement('div');
  bonusRow.className = 'summary-row';
  bonusRow.innerHTML = `<span class="label">Bonus${needed>0?' (need '+needed+')':''}</span><span class="val" style="color:${bonusEarned?'#f0c040':'rgba(255,255,255,0.2)'}">${bonusEarned?'+35':'—'}</span>`;
  sc.appendChild(bonusRow);

  addSectionHeader(sc, 'Lower');
  LOWER_CATS.forEach(cat => sc.appendChild(makeScoreRow(cat)));

  if (yahtzeeBonus > 0) {
    const yRow = document.createElement('div');
    yRow.className = 'summary-row';
    yRow.innerHTML = `<span class="label">Yahtzee Bonus</span><span class="val" style="color:#f0c040">+${yahtzeeBonus}</span>`;
    sc.appendChild(yRow);
  }

  const totalRow = document.createElement('div');
  totalRow.className = 'grand-total-row';
  totalRow.innerHTML = `<span class="label">Total</span><span class="val">${getTotalScore()}</span>`;
  sc.appendChild(totalRow);
}

function addSectionHeader(parent, text) {
  const h = document.createElement('div');
  h.className = 'section-header';
  h.textContent = text;
  parent.appendChild(h);
}

function makeScoreRow(cat) {
  const row = document.createElement('div');
  const isScored  = scores[cat] !== undefined;
  const potential = (rolled && !isScored) ? calcScore(cat, dice) : null;
  const canScore  = rolled && !isScored;

  row.className = 'score-row' + (isScored ? ' scored' : '') + (canScore ? ' scoreable' : '');

  let valHtml;
  if (isScored) {
    valHtml = `<span class="cat-val">${scores[cat]}</span>`;
  } else if (potential !== null) {
    valHtml = `<span class="cat-val ${potential===0?'zero':''}">${potential}</span>`;
  } else {
    valHtml = `<span class="cat-val empty">—</span>`;
  }

  row.innerHTML = `<span class="cat-name">${CAT_INFO[cat].name}</span>${valHtml}`;
  if (canScore) row.onclick = () => scoreCategory(cat);
  return row;
}

// ── Start ──
newGame();
</script>
</body>
</html>
