<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🃏 Memory</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0f1923;
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  color: #fff;
  padding-bottom: 48px;
}

header {
  background: #0a1018;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
header a { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.9em; }
header a:hover { color: rgba(255,255,255,0.8); }
header h1 { font-size: 1.2em; font-weight: 700; color: #f0e0a0; flex: 1; }
.hdr-stat { font-size: 1em; font-weight: 700; color: #f0c040; }

main {
  max-width: 640px;
  margin: 0 auto;
  padding: 16px 12px;
}

/* Controls */
.controls {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  justify-content: center;
  flex-wrap: wrap;
}
.diff-btn {
  padding: 7px 18px;
  border: 2px solid #c8960a;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.5);
  font-weight: 700;
  font-size: 0.9em;
  cursor: pointer;
  transition: all 0.15s;
}
.diff-btn.active {
  background: linear-gradient(135deg, #f0c040, #d4a010);
  color: #2a1800;
  border-color: #f0c040;
}
.diff-btn:hover:not(.active) { background: rgba(255,255,255,0.1); color: #fff; }
.btn {
  padding: 7px 18px;
  border: 2px solid #c8960a;
  border-radius: 8px;
  background: linear-gradient(135deg, #f0c040, #d4a010);
  color: #2a1800;
  font-weight: 700;
  font-size: 0.9em;
  cursor: pointer;
  transition: background 0.15s;
}
.btn:hover { background: linear-gradient(135deg, #ffe060, #e8b820); }

.info-row {
  display: flex;
  justify-content: space-around;
  align-items: center;
  margin-bottom: 14px;
  background: #1a2534;
  border-radius: 10px;
  padding: 8px 12px;
  font-size: 0.88em;
  color: rgba(255,255,255,0.45);
}
.info-row .val { font-weight: 700; color: #f0c040; }

/* Grid */
#grid {
  display: grid;
  gap: 7px;
}

/* Card flip */
.card {
  aspect-ratio: 1;
  perspective: 600px;
  cursor: pointer;
  user-select: none;
  container-type: inline-size;
}
.card-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
}
.card.flipped .card-inner,
.card.matched .card-inner { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  inset: 0;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}
.card-back {
  background: linear-gradient(145deg, #243447, #182535);
  border: 2px solid rgba(255,255,255,0.08);
  box-shadow: 0 2px 6px rgba(0,0,0,0.5);
}
.card-back::after {
  content: '?';
  font-size: 1.6em;
  font-weight: 900;
  color: rgba(255,255,255,0.1);
}
.card-front {
  background: linear-gradient(145deg, #f5e8c0, #e0cc90);
  border: 2px solid #c8a040;
  transform: rotateY(180deg);
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
.card.matched .card-front {
  background: linear-gradient(145deg, #d4f0d4, #a8dca8);
  border-color: #4caf50;
}
.card-emoji {
  font-size: 72cqw;
  line-height: 1;
}

/* Win overlay */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 100;
  align-items: center; justify-content: center;
}
.overlay.show { display: flex; }
.overlay-box {
  background: #1e2d3d;
  border-radius: 20px;
  padding: 36px 40px;
  text-align: center;
  max-width: 320px; width: 90%;
  border: 1px solid rgba(240,192,64,0.3);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.overlay-box h2 { font-size: 2em; color: #f0c040; margin-bottom: 16px; }
.overlay-box .result { color: rgba(255,255,255,0.6); font-size: 0.95em; line-height: 2; margin-bottom: 24px; }
.overlay-box .result strong { color: #fff; font-size: 1.15em; }
</style>
</head>
<body>

<header>
  <a href="index.html">← Games</a>
  <h1>🃏 Memory</h1>
  <div class="hdr-stat"><span id="hdr-matched">0</span>/<span id="hdr-total">0</span></div>
</header>

<div class="overlay" id="win-overlay">
  <div class="overlay-box">
    <h2>🎉 You Win!</h2>
    <div class="result" id="win-result"></div>
    <div id="mem-best-msg" style="color:rgba(255,255,255,0.4);font-size:.85em;margin-top:6px;min-height:1.2em;"></div>
    <button class="btn" onclick="newGame()">Play Again</button>
  </div>
</div>

<main>
  <div class="controls">
    <button class="diff-btn active" id="btn-easy"   onclick="setDiff('easy')">Easy</button>
    <button class="diff-btn"        id="btn-medium" onclick="setDiff('medium')">Medium</button>
    <button class="diff-btn"        id="btn-hard"   onclick="setDiff('hard')">Hard</button>
    <button class="btn" onclick="newGame()">🔀 New</button>
  </div>

  <div class="info-row">
    <div>Moves <span class="val" id="moves">0</span></div>
    <div>Time <span class="val" id="timer">0:00</span></div>
    <div>Pairs <span class="val" id="pairs">0</span>/<span class="val" id="pairs-total">0</span></div>
  </div>

  <div id="grid"></div>
</main>

<script>
const EMOJI_POOL = [
  '🐶','🐱','🐻','🐼','🦊','🐯','🦁','🐸',
  '🐙','🦋','🦄','🐲','🦜','🐬','🦈','🐊',
  '🎭','🎨','🎪','🎯','🎲','🎸','🏆','🌈',
  '🍕','🍔','🍣','🍩','🌮','🧁','🚀','✈️',
  '🚂','⛵','🏰','🗼','🌋','🗻','🎠','🎡'
];

const DIFFS = {
  easy:   { cols: 4, pairs: 8 },
  medium: { cols: 5, pairs: 10 },
  hard:   { cols: 6, pairs: 18 }
};

let diff = 'easy';
let cards = [];
let firstIdx = null;
let locked = false;
let moves = 0;
let matched = 0;
let startTime = null;
let timerInterval = null;

function setDiff(d) {
  diff = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + d).classList.add('active');
  newGame();
}

function newGame() {
  clearInterval(timerInterval);
  firstIdx = null;
  locked = false;
  moves = 0;
  matched = 0;
  startTime = null;

  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('moves').textContent = '0';
  document.getElementById('timer').textContent = '0:00';

  const { cols, pairs } = DIFFS[diff];

  // Pick emoji and create shuffled pairs
  const pool = [...EMOJI_POOL].sort(() => Math.random() - 0.5).slice(0, pairs);
  cards = [...pool, ...pool]
    .map(emoji => ({ emoji, flipped: false, matched: false, el: null }))
    .sort(() => Math.random() - 0.5);

  document.getElementById('hdr-total').textContent = pairs;
  document.getElementById('hdr-matched').textContent = '0';
  document.getElementById('pairs-total').textContent = pairs;
  document.getElementById('pairs').textContent = '0';

  buildGrid(cols);
}

function buildGrid(cols) {
  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.innerHTML = '';

  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back"></div>
        <div class="card-face card-front">
          <span class="card-emoji">${card.emoji}</span>
        </div>
      </div>`;
    el.addEventListener('click', () => onCardClick(i));
    grid.appendChild(el);
    card.el = el;
  });
}

function onCardClick(i) {
  const card = cards[i];
  if (locked || card.flipped || card.matched) return;

  // Start timer on first flip
  if (!startTime) {
    startTime = Date.now();
    timerInterval = setInterval(() => {
      const s = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('timer').textContent =
        `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
    }, 500);
  }

  card.flipped = true;
  card.el.classList.add('flipped');

  if (firstIdx === null) {
    firstIdx = i;
    return;
  }

  // Second card
  const a = cards[firstIdx];
  const b = card;
  firstIdx = null;
  locked = true;
  moves++;
  document.getElementById('moves').textContent = moves;

  if (a.emoji === b.emoji) {
    setTimeout(() => {
      a.matched = b.matched = true;
      a.el.classList.add('matched');
      b.el.classList.add('matched');
      matched++;
      document.getElementById('pairs').textContent = matched;
      document.getElementById('hdr-matched').textContent = matched;
      locked = false;

      if (matched === DIFFS[diff].pairs) {
        clearInterval(timerInterval);
        setTimeout(showWin, 400);
      }
    }, 350);
  } else {
    setTimeout(() => {
      a.flipped = b.flipped = false;
      a.el.classList.remove('flipped');
      b.el.classList.remove('flipped');
      locked = false;
    }, 900);
  }
}

function showWin() {
  const elapsed = startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;
  const m = Math.floor(elapsed / 60), s = elapsed % 60;
  const timeStr = m > 0 ? `${m}m ${s}s` : `${s}s`;
  document.getElementById('win-result').innerHTML =
    `<strong>${moves}</strong> moves &nbsp;·&nbsp; <strong>${timeStr}</strong>`;
  // Best time
  const key  = `mem_best_${diff}`;
  const prev = parseInt(localStorage.getItem(key) || '0');
  if (!prev || elapsed < prev) {
    localStorage.setItem(key, elapsed);
    document.getElementById('mem-best-msg').textContent = prev ? '🏆 New best time!' : 'First solve!';
  } else {
    const pm = Math.floor(prev/60), ps = prev%60;
    document.getElementById('mem-best-msg').textContent = `Best: ${pm>0?pm+'m ':''}${ps}s`;
  }
  document.getElementById('win-overlay').classList.add('show');
}

newGame();
</script>
</body>
</html>
