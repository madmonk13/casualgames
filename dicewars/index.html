<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 Dice Wars</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d1117;
  font-family: system-ui, -apple-system, sans-serif;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
header {
  width: 100%;
  max-width: 600px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 8px;
  gap: 10px;
}
header a { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.85em; white-space: nowrap; }
header a:hover { color: #f0c040; }
header h1 {
  font-size: 1.3em; font-weight: 800; letter-spacing: 1px;
  background: linear-gradient(135deg,#f0c040,#ffe880);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.btn { padding: 6px 14px; border-radius: 7px; border: none; cursor: pointer; font-size: 0.82em; font-weight: 700; transition: background 0.15s; }
.btn-primary { background: linear-gradient(135deg,#f0c040,#d4a010); color: #2a1800; }
.btn-primary:hover { background: linear-gradient(135deg,#ffe060,#e8b820); }
.btn-ghost { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.75); border: 1px solid rgba(255,255,255,0.15); }
.btn-ghost:hover { background: rgba(255,255,255,0.14); }
.btn:disabled { opacity: 0.35; cursor: default; }

#canvas-wrap { width: min(560px, 100vw - 8px); position: relative; }
#canvas { width: 100%; height: auto; display: block; touch-action: none; cursor: pointer; }

#battle-display {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.84);
  background: rgba(8,12,20,0.94);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 14px;
  padding: 14px 22px 16px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s, transform 0.15s;
  min-width: 220px;
  text-align: center;
  backdrop-filter: blur(8px);
  z-index: 10;
}
#battle-display.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
.b-row { display: flex; align-items: center; gap: 8px; justify-content: center; margin: 4px 0; }
.b-name { font-size: 0.75em; font-weight: 700; min-width: 54px; text-align: right; }
.b-dice { font-size: 3em; letter-spacing: 2px; line-height: 1; min-width: 40px; }
.b-total { font-size: 0.9em; font-weight: 800; min-width: 22px; text-align: left; padding-left: 2px; }
.b-result { font-size: 0.82em; font-weight: 700; margin: 6px 0 4px; min-height: 1.2em; }
.dice-row { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; align-items: center; min-height: 38px; padding: 2px 0; perspective: 300px; }

/* ── 3D Dice ── */
.die-3d {
  width: 32px; height: 32px; position: relative;
  transform-style: preserve-3d;
  transform: rotateX(0deg) rotateY(0deg);
  flex-shrink: 0;
}
.face {
  position: absolute; width: 32px; height: 32px;
  background: #ddd8f0;
  border: 1.5px solid rgba(255,255,255,0.55);
  border-radius: 5px;
  box-shadow: inset 0 0 5px rgba(0,0,0,0.12), 0 2px 4px rgba(0,0,0,0.45);
}
.face.f-front  { transform: translateZ(16px); }
.face.f-back   { transform: rotateY(180deg) translateZ(16px); }
.face.f-right  { transform: rotateY(90deg)  translateZ(16px); }
.face.f-left   { transform: rotateY(-90deg) translateZ(16px); }
.face.f-top    { transform: rotateX(-90deg) translateZ(16px); }
.face.f-bottom { transform: rotateX(90deg)  translateZ(16px); }
.pip {
  position: absolute; width: 6px; height: 6px;
  background: #1a0a30; border-radius: 50%;
  box-shadow: inset 0 1px 1px rgba(0,0,0,0.35);
}

#status-bar {
  width: min(560px, 100vw - 8px);
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 4px; gap: 8px;
}
#turn-label { font-size: 0.92em; font-weight: 700; padding: 5px 12px; border-radius: 6px; min-width: 90px; text-align: center; }
#bonus-label { font-size: 0.78em; color: rgba(255,255,255,0.4); flex: 1; text-align: center; }

#scoreboard { width: min(560px,100vw - 8px); display: flex; flex-wrap: wrap; gap: 5px; padding: 4px 4px 16px; justify-content: center; }
.score-card { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; padding: 4px 10px; font-size: 0.78em; transition: opacity 0.3s; }
.score-card.eliminated { opacity: 0.25; text-decoration: line-through; }
.score-card.active-turn { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); }
.score-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.score-name { font-weight: 700; }
.score-stats { color: rgba(255,255,255,0.5); }
.score-strat { font-size: 0.8em; color: rgba(255,255,255,0.25); font-style: italic; }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
.overlay.show { display: flex; }
.overlay-box { background: linear-gradient(145deg,#1a2230,#111820); border: 1px solid rgba(240,192,64,0.35); border-radius: 16px; padding: 36px 44px; text-align: center; min-width: 260px; }
.overlay-box h2 { font-size: 2em; margin-bottom: 8px; color: #f0c040; }
.overlay-box p { color: rgba(255,255,255,0.6); margin-bottom: 24px; font-size: 0.95em; }
</style>
</head>
<body>

<header>
  <a href="../index.html">← Games</a>
  <h1>🎲 Dice Wars</h1>
  <button class="btn btn-ghost" onclick="newGame()">↺ New</button>
</header>

<div id="canvas-wrap">
  <canvas id="canvas" width="560" height="380"></canvas>
  <div id="battle-display"></div>
</div>

<div id="status-bar">
  <div id="turn-label">…</div>
  <div id="bonus-label"></div>
  <button id="end-btn" class="btn btn-primary" onclick="humanEndTurn()" disabled>End Turn ▶</button>
</div>

<div id="scoreboard"></div>

<div class="overlay" id="win-overlay">
  <div class="overlay-box">
    <h2 id="win-title"></h2>
    <p id="win-msg"></p>
    <button class="btn btn-primary" onclick="newGame()">Play Again</button>
  </div>
</div>

<script>
// ── PRNG ─────────────────────────────────────────────────────────────────────
function makePRNG(seed) {
  return () => {
    seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ── CONFIG ────────────────────────────────────────────────────────────────────
const CANVAS_W  = 560, CANVAS_H = 380;
const HEX_R     = 20;
const HEX_W     = Math.sqrt(3) * HEX_R;
const MARGIN    = 12;
const COLS      = 15, ROWS = 11;
const NUM_TERR  = 32;
const NUM_WATER = 5;
const NUM_PL    = 6;
const HUMAN     = 0;
const MAX_DICE  = 8;
const AI_MS     = 320;

const COLORS     = ['#4f8ef7','#ef4444','#22c55e','#f59e0b','#a855f7','#f97316'];
const NAMES      = ['You','Red','Green','Amber','Purple','Orange'];
// ── 3D DICE ENGINE ────────────────────────────────────────────────────────────
const _PIP_POS = [3, 13, 23];
const _PIP_LAYOUTS = {
  1:[[1,1]], 2:[[0,2],[2,0]], 3:[[0,2],[1,1],[2,0]],
  4:[[0,0],[0,2],[2,0],[2,2]], 5:[[0,0],[0,2],[1,1],[2,0],[2,2]],
  6:[[0,0],[0,2],[1,0],[1,2],[2,0],[2,2]],
};
const _FACE_NUMS = { front:1, back:6, right:3, left:4, top:2, bottom:5 };
const _FACE_ROTS = { 1:[0,0], 2:[-90,0], 3:[0,90], 4:[0,-90], 5:[90,0], 6:[0,180] };
const _dieState  = new Map();

function _makePips(n) {
  return (_PIP_LAYOUTS[n]||[]).map(([r,c])=>
    `<div class="pip" style="top:${_PIP_POS[r]}px;left:${_PIP_POS[c]}px"></div>`
  ).join('');
}
function _make3DDie(id) {
  const faces = ['front','back','right','left','top','bottom'].map(f=>
    `<div class="face f-${f}">${_makePips(_FACE_NUMS[f])}</div>`
  ).join('');
  return `<div class="die-3d" id="${id}">${faces}</div>`;
}
function _startDieSpin(el) {
  const vx=3+Math.random()*5, vy=4+Math.random()*6, vz=1+Math.random()*3;
  let rx=Math.random()*360, ry=Math.random()*360, rz=Math.random()*360;
  el.style.transition='none';
  function tick() {
    rx+=vx; ry+=vy; rz+=vz;
    el.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg) rotateZ(${rz}deg)`;
    _dieState.set(el,{rx,ry,rz,rafId:requestAnimationFrame(tick)});
  }
  _dieState.set(el,{rx,ry,rz:0,rafId:requestAnimationFrame(tick)});
}
function _landDie3D(el, face, delay) {
  const s=_dieState.get(el);
  if(s?.rafId) cancelAnimationFrame(s.rafId);
  _dieState.delete(el);
  const [tx,ty]=_FACE_ROTS[face]||[0,0];
  const finalX=Math.round((s?.rx||0)/360)*360+tx;
  const finalY=Math.round((s?.ry||0)/360)*360+ty;
  setTimeout(()=>{
    el.style.transition='transform 0.42s cubic-bezier(0.22,1.4,0.48,1)';
    el.style.transform=`rotateX(${finalX}deg) rotateY(${finalY}deg)`;
  }, delay);
}
const STRATEGIES = [null,'Reckless','Cautious','Greedy','Bold','Expand'];

const WATER_FILL   = '#1a3d5a';
const WATER_DEEP   = '#122b40';
const WATER_BORDER = '#0d2030';

// ── HEX MATH ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

function hexCenter(col, row) {
  return {
    x: MARGIN + HEX_W * 0.5 + col * HEX_W + (row % 2 === 1 ? HEX_W * 0.5 : 0),
    y: MARGIN + HEX_R        + row * HEX_R * 1.5,
  };
}
function hexVerts(col, row) {
  const { x, y } = hexCenter(col, row);
  return Array.from({length:6}, (_,i) => {
    const a = Math.PI/180*(60*i-90);
    return { x: x + HEX_R*Math.cos(a), y: y + HEX_R*Math.sin(a) };
  });
}
function drawHex(col, row, fill, stroke, lw) {
  const v = hexVerts(col, row);
  ctx.beginPath(); ctx.moveTo(v[0].x, v[0].y);
  for (let i=1;i<6;i++) ctx.lineTo(v[i].x, v[i].y);
  ctx.closePath();
  if (fill)   { ctx.fillStyle=fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle=stroke; ctx.lineWidth=lw||1; ctx.stroke(); }
}
function hexNeighbors(col, row) {
  const odd = row%2===1;
  return [
    [col-1,row],[col+1,row],
    [col+(odd?0:-1),row-1],[col+(odd?1:0),row-1],
    [col+(odd?0:-1),row+1],[col+(odd?1:0),row+1],
  ].filter(([c,r])=>c>=0&&c<COLS&&r>=0&&r<ROWS);
}

// ── MAP GENERATION ────────────────────────────────────────────────────────────
let territories = [];
let hexOwner    = new Int16Array(COLS*ROWS).fill(-1);
let waterSet    = new Set();
let borderEdges = [];

function generateMap(rng) {
  hexOwner.fill(-1);
  const all = Array.from({length:COLS*ROWS},(_,i)=>i);
  for (let i=all.length-1;i>0;i--) {
    const j=Math.floor(rng()*(i+1)); [all[i],all[j]]=[all[j],all[i]];
  }
  const queues = all.slice(0,NUM_TERR).map((idx,t)=>{ hexOwner[idx]=t; return [idx]; });
  let active=true;
  while(active) {
    active=false;
    for (let t=0;t<NUM_TERR;t++) {
      if(!queues[t].length) continue;
      const idx=queues[t].shift();
      const c=idx%COLS, r=Math.floor(idx/COLS);
      for (const [nc,nr] of hexNeighbors(c,r)) {
        const ni=nr*COLS+nc;
        if(hexOwner[ni]===-1){hexOwner[ni]=t;queues[t].push(ni);active=true;}
      }
    }
  }
  territories = Array.from({length:NUM_TERR},(_,id)=>({
    id, hexes:[], player:-1, dice:1, neighbors:new Set(), cx:0, cy:0
  }));
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const t=hexOwner[r*COLS+c];
    territories[t].hexes.push([c,r]);
    for (const [nc,nr] of hexNeighbors(c,r)) {
      const nt=hexOwner[nr*COLS+nc];
      if(nt!==t) territories[t].neighbors.add(nt);
    }
  }
  for (const t of territories) {
    let sx=0,sy=0;
    for (const [c,r] of t.hexes){const p=hexCenter(c,r);sx+=p.x;sy+=p.y;}
    t.cx=sx/t.hexes.length; t.cy=sy/t.hexes.length;
  }

  // Pick water territories, ensuring all land stays connected
  const bySize = territories.map(t=>t.id).sort((a,b)=>territories[b].hexes.length-territories[a].hexes.length);
  const pool = bySize.slice(3, NUM_TERR-3);
  for (let i=pool.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  waterSet = new Set();
  for (const tid of pool) {
    if(waterSet.size>=NUM_WATER) break;
    waterSet.add(tid);
    if(!isLandConnected(waterSet)) waterSet.delete(tid);
  }

  // Remove water from land neighbor sets
  for (const t of territories) {
    if(!waterSet.has(t.id))
      for (const nid of [...t.neighbors])
        if(waterSet.has(nid)) t.neighbors.delete(nid);
  }
  buildBorderEdges();
}

function isLandConnected(wSet) {
  const landIds = territories.filter(t=>!wSet.has(t.id)).map(t=>t.id);
  if(!landIds.length) return false;
  const landSet=new Set(landIds), visited=new Set([landIds[0]]), q=[landIds[0]];
  while(q.length){
    const cur=q.shift();
    for(const nid of territories[cur].neighbors)
      if(landSet.has(nid)&&!visited.has(nid)){visited.add(nid);q.push(nid);}
  }
  return visited.size===landIds.length;
}

function buildBorderEdges() {
  borderEdges=[];
  const seen=new Set();
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const t1=hexOwner[r*COLS+c], v1=hexVerts(c,r);
    for(const [nc,nr] of hexNeighbors(c,r)){
      const t2=hexOwner[nr*COLS+nc];
      if(t1===t2) continue;
      const key=Math.min(r*COLS+c,nr*COLS+nc)+'_'+Math.max(r*COLS+c,nr*COLS+nc);
      if(seen.has(key)) continue; seen.add(key);
      const v2=hexVerts(nc,nr), shared=[];
      for(const a of v1){
        for(const b of v2)
          if(Math.abs(a.x-b.x)<1.5&&Math.abs(a.y-b.y)<1.5){shared.push(a);break;}
        if(shared.length===2) break;
      }
      if(shared.length===2)
        borderEdges.push({pts:shared, water:waterSet.has(t1)||waterSet.has(t2)});
    }
  }
}

// ── GAME STATE ────────────────────────────────────────────────────────────────
let rng, currentPlayer, selected, phase, aiTimer;
let battleAnimating = false;

function newGame() {
  clearTimeout(aiTimer);
  clearBattleAnim();
  battleAnimating = false;
  consecutivePasses = 0;
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('battle-display').classList.remove('show');
  setupGame(Date.now() & 0x7fffffff);
}

function setupGame(seed) {
  rng = makePRNG(seed);
  generateMap(rng);
  const landIds = territories.filter(t=>!waterSet.has(t.id)).map(t=>t.id);
  for(let i=landIds.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[landIds[i],landIds[j]]=[landIds[j],landIds[i]];}
  landIds.forEach((id,i)=>{territories[id].player=i%NUM_PL; territories[id].dice=1;});
  for(let i=0;i<landIds.length*2;i++){
    const t=territories[landIds[Math.floor(rng()*landIds.length)]];
    if(t.dice<MAX_DICE) t.dice++;
  }
  currentPlayer=HUMAN; selected=null; phase='playing';
  updateUI(); render();
}

// ── RENDERING ─────────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0,0,CANVAS_W,CANVAS_H);
  ctx.fillStyle='#0d1117'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);

  for(const t of territories){
    if(waterSet.has(t.id)){
      for(let hi=0;hi<t.hexes.length;hi++){
        const [c,r]=t.hexes[hi];
        drawHex(c,r,hi%3===0?WATER_DEEP:WATER_FILL,null);
      }
    } else {
      for(const [c,r] of t.hexes) drawHex(c,r,COLORS[t.player],null);
    }
  }

  ctx.lineWidth=2.2; ctx.beginPath();
  for(const{pts,water}of borderEdges) if(!water){ctx.moveTo(pts[0].x,pts[0].y);ctx.lineTo(pts[1].x,pts[1].y);}
  ctx.strokeStyle='rgba(0,0,0,0.65)'; ctx.stroke();

  ctx.lineWidth=1.8; ctx.beginPath();
  for(const{pts,water}of borderEdges) if(water){ctx.moveTo(pts[0].x,pts[0].y);ctx.lineTo(pts[1].x,pts[1].y);}
  ctx.strokeStyle=WATER_BORDER; ctx.stroke();

  if(selected!==null){
    const st=territories[selected];
    for(const [c,r] of st.hexes) drawHex(c,r,'rgba(255,255,255,0.28)',null);
    for(const nid of st.neighbors)
      if(!waterSet.has(nid)&&territories[nid].player!==st.player)
        for(const [c,r] of territories[nid].hexes) drawHex(c,r,'rgba(255,210,0,0.22)',null);
  }

  if(phase==='playing'&&currentPlayer===HUMAN&&!battleAnimating){
    for(const t of territories){
      if(waterSet.has(t.id)||t.player!==HUMAN||t.dice<2) continue;
      const col=selected===t.id?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.32)';
      for(const [c,r] of t.hexes) drawHex(c,r,null,col,selected===t.id?2.5:1.2);
    }
  }

  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font=`bold ${Math.round(HEX_R*0.72)}px system-ui`;
  ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=4;
  for(const t of territories){
    if(waterSet.has(t.id)) continue;
    ctx.fillStyle='#fff'; ctx.fillText(t.dice,t.cx,t.cy);
  }
  ctx.shadowBlur=0;
  ctx.font=`${Math.round(HEX_R*0.58)}px system-ui`;
  ctx.fillStyle='rgba(100,170,220,0.3)';
  for(const t of territories) if(waterSet.has(t.id)) ctx.fillText('〰',t.cx,t.cy);
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
function pixelToTerritory(px,py){
  let best=-1,bestD=Infinity;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const{x,y}=hexCenter(c,r), d=Math.hypot(x-px,y-py);
    if(d<bestD){bestD=d;best=r*COLS+c;}
  }
  return bestD<HEX_R*1.1?hexOwner[best]:-1;
}
function canvasXY(e){
  const rect=canvas.getBoundingClientRect();
  return{x:(e.clientX-rect.left)*(CANVAS_W/rect.width),y:(e.clientY-rect.top)*(CANVAS_H/rect.height)};
}
function handleClick(px,py){
  if(phase!=='playing'||currentPlayer!==HUMAN||battleAnimating) return;
  const tid=pixelToTerritory(px,py);
  if(tid<0||waterSet.has(tid)){selected=null;render();return;}
  const t=territories[tid];
  if(selected===null){
    if(t.player===HUMAN&&t.dice>1){selected=tid;render();}
    return;
  }
  if(tid===selected){selected=null;render();return;}
  const src=territories[selected];
  if(t.player!==HUMAN&&src.neighbors.has(tid)){
    doAttack(selected,tid);
  } else if(t.player===HUMAN&&t.dice>1){
    selected=tid;render();
  } else {
    selected=null;render();
  }
}
canvas.addEventListener('click',e=>{const{x,y}=canvasXY(e);handleClick(x,y);});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  const{x,y}=canvasXY(e.changedTouches[0]);handleClick(x,y);
},{passive:false});

// ── COMBAT ────────────────────────────────────────────────────────────────────
function rollDice(n){return Array.from({length:n},()=>Math.floor(rng()*6)+1);}

function doAttack(fromId, toId) {
  const from=territories[fromId], to=territories[toId];
  const ar=rollDice(from.dice), dr=rollDice(to.dice);
  const as_=ar.reduce((a,b)=>a+b,0), ds=dr.reduce((a,b)=>a+b,0);
  const won=as_>ds;
  const isHuman=from.player===HUMAN||to.player===HUMAN;
  const attackingPlayer=from.player;

  selected=null;
  render();

  function applyResult() {
    if(won){to.player=from.player;to.dice=from.dice-1;from.dice=1;}
    else{from.dice=1;}
    if(checkWin()) return;
    updateUI();render();
  }
  function scheduleNextAI() {
    if(attackingPlayer!==HUMAN&&phase==='playing')
      aiTimer=setTimeout(aiStep,AI_MS);
  }

  if(isHuman){
    battleAnimating=true;
    updateUI(); // disable End Turn button
    showBattleSequential(from.player,to.player,ar,dr,as_,ds,won,()=>{
      battleAnimating=false;
      applyResult();
      scheduleNextAI();
    });
  } else {
    // AI vs AI: apply immediately, quick display
    applyResult();
    showBattleQuick(from.player,to.player,ar,dr,as_,ds,won);
    scheduleNextAI();
  }
}

// ── BATTLE DISPLAY ────────────────────────────────────────────────────────────
let battleT1=null, battleT2=null, battleT3=null;

function clearBattleAnim() {
  clearTimeout(battleT1); clearTimeout(battleT2); clearTimeout(battleT3);
  // cancel any live RAF spins
  const el=document.getElementById('battle-display');
  el.querySelectorAll('.die-3d').forEach(d=>{
    const s=_dieState.get(d);
    if(s?.rafId) cancelAnimationFrame(s.rafId);
    _dieState.delete(d);
  });
}

function _buildBattleHTML(ap, dp, numA, numD, as_, ds, resultHTML) {
  const ac=COLORS[ap], dc=COLORS[dp];
  const aDice = Array.from({length:numA},(_,i)=>_make3DDie(`bd-a${i}`)).join('');
  const dDice = Array.from({length:numD},(_,i)=>_make3DDie(`bd-d${i}`)).join('');
  // Stable IDs so Phase 4 can update totals/result without rebuilding dice
  const totA = `<span id="bd-totA" class="b-total" style="color:${ac};visibility:${as_!=null?'visible':'hidden'}">${as_??'0'}</span>`;
  const totD = `<span id="bd-totD" class="b-total" style="color:${dc};visibility:${ds !=null?'visible':'hidden'}">${ds ??'0'}</span>`;
  const res  = `<div id="bd-res">${resultHTML||'<div class="b-result" style="color:transparent">·</div>'}</div>`;
  return `
    <div class="b-row">
      <span class="b-name" style="color:${ac}">${NAMES[ap]}</span>
      <span class="b-dice"><div class="dice-row">${aDice}</div></span>${totA}
    </div>
    ${res}
    <div class="b-row">
      <span class="b-name" style="color:${dc}">${NAMES[dp]}</span>
      <span class="b-dice"><div class="dice-row">${dDice}</div></span>${totD}
    </div>`;
}

function _spinAll(prefix, count) {
  for(let i=0;i<count;i++){
    const d=document.getElementById(`${prefix}${i}`);
    if(d) _startDieSpin(d);
  }
}
function _landAll(prefix, rolls, delay) {
  rolls.forEach((val,i)=>{
    const d=document.getElementById(`${prefix}${i}`);
    if(d) _landDie3D(d, val, delay + i*60);
  });
}

// Sequential battle: attacker spins 500ms → lands, defender spins 500ms → lands → result 1000ms → callback
function showBattleSequential(ap,dp,ar,dr,as_,ds,won,onComplete){
  const el=document.getElementById('battle-display');
  clearBattleAnim();
  el.classList.add('show');

  const atkLabel = ap===0 ? 'You win'    : `${NAMES[ap]} wins`;
  const defLabel = dp===0 ? 'You defend' : `${NAMES[dp]} defends`;
  const resHTML  = won
    ? `<div class="b-result" style="color:#22c55e">⚔️ ${atkLabel}!</div>`
    : `<div class="b-result" style="color:#ef4444">🛡️ ${defLabel}!</div>`;

  // Phase 1: all dice spinning
  el.innerHTML = _buildBattleHTML(ap, dp, ar.length, dr.length, null, null, null);
  _spinAll('bd-a', ar.length);
  _spinAll('bd-d', dr.length);

  // Phase 2 @ 500ms: land attacker dice
  battleT1 = setTimeout(()=>{
    _landAll('bd-a', ar, 0);

    // Phase 3 @ +500ms: land defender dice
    battleT2 = setTimeout(()=>{
      _landAll('bd-d', dr, 0);

      // Phase 4 @ +500ms: reveal totals + result in place (no dice rebuild)
      battleT3 = setTimeout(()=>{
        const tA=document.getElementById('bd-totA');
        const tD=document.getElementById('bd-totD');
        const res=document.getElementById('bd-res');
        if(tA){ tA.textContent=as_; tA.style.visibility='visible'; }
        if(tD){ tD.textContent=ds;  tD.style.visibility='visible'; }
        if(res){ res.innerHTML=resHTML; }

        battleT1 = setTimeout(()=>{
          el.classList.remove('show');
          setTimeout(onComplete, 160);
        }, 2000);
      }, 500);
    }, 500);
  }, 500);
}

// Quick display for AI vs AI battles
function showBattleQuick(ap,dp,ar,dr,as_,ds,won){
  const el=document.getElementById('battle-display');
  clearBattleAnim();
  el.classList.add('show');

  const atkLabel = ap===0 ? 'You win'    : `${NAMES[ap]} wins`;
  const defLabel = dp===0 ? 'You defend' : `${NAMES[dp]} defends`;
  const resHTML  = won
    ? `<div class="b-result" style="color:#22c55e">⚔️ ${atkLabel}!</div>`
    : `<div class="b-result" style="color:#ef4444">🛡️ ${defLabel}!</div>`;

  el.innerHTML = _buildBattleHTML(ap, dp, ar.length, dr.length, null, null, null);
  _spinAll('bd-a', ar.length);
  _spinAll('bd-d', dr.length);

  battleT1 = setTimeout(()=>{
    el.innerHTML = _buildBattleHTML(ap, dp, ar.length, dr.length, as_, ds, resHTML);
    _landAll('bd-a', ar, 0);
    _landAll('bd-d', dr, 0);
    battleT2 = setTimeout(()=>el.classList.remove('show'), 1800);
  }, 250);
}

// ── TURN / BONUS ──────────────────────────────────────────────────────────────
function largestGroup(player){
  const mine=new Set(territories.filter(t=>t.player===player&&!waterSet.has(t.id)).map(t=>t.id));
  const vis=new Set(); let max=0;
  for(const id of mine){
    if(vis.has(id)) continue;
    const q=[id];vis.add(id);let sz=0;
    while(q.length){const cur=q.shift();sz++;
      for(const nid of territories[cur].neighbors)
        if(!vis.has(nid)&&mine.has(nid)){vis.add(nid);q.push(nid);}
    }
    if(sz>max) max=sz;
  }
  return max;
}

function distributeDice(player,count){
  const el=territories.filter(t=>t.player===player&&t.dice<MAX_DICE&&!waterSet.has(t.id));
  let left=count;
  while(left>0&&el.some(t=>t.dice<MAX_DICE)){
    const t=el[Math.floor(rng()*el.length)];
    if(t.dice<MAX_DICE){t.dice++;left--;}
  }
}

let consecutivePasses=0;

function endTurn(){
  distributeDice(currentPlayer,largestGroup(currentPlayer));
  let next=(currentPlayer+1)%NUM_PL,loops=0;
  while(!territories.some(t=>t.player===next&&!waterSet.has(t.id))){
    next=(next+1)%NUM_PL;if(++loops>NUM_PL) break;
  }
  currentPlayer=next;selected=null;
  updateUI();render();
  if(currentPlayer!==HUMAN) aiTimer=setTimeout(aiStep,AI_MS);
}

function humanEndTurn(){
  if(phase!=='playing'||currentPlayer!==HUMAN||battleAnimating) return;
  consecutivePasses=0;
  endTurn();
}

// ── AI ────────────────────────────────────────────────────────────────────────
function bestAttack(player){
  const strat=STRATEGIES[player]||'Greedy';
  const cands=[];
  for(const from of territories){
    if(from.player!==player||from.dice<2||waterSet.has(from.id)) continue;
    for(const nid of from.neighbors){
      const to=territories[nid];
      if(to.player===player||waterSet.has(to.id)) continue;
      cands.push({fromId:from.id,toId:nid,adv:from.dice-to.dice,toDice:to.dice});
    }
  }
  if(!cands.length) return null;
  switch(strat){
    case 'Reckless':{const v=cands.filter(c=>c.adv>=-1);return v.length?v[Math.floor(rng()*v.length)]:null;}
    case 'Cautious':{const v=cands.filter(c=>c.adv>=2);return v.length?v.sort((a,b)=>b.adv-a.adv)[0]:null;}
    case 'Greedy':  {const v=cands.filter(c=>c.adv>0); return v.length?v.sort((a,b)=>b.adv-a.adv)[0]:null;}
    case 'Bold':    {const v=cands.filter(c=>c.adv>=0);return v.length?v.sort((a,b)=>a.toDice-b.toDice)[0]:null;}
    case 'Expand':  {
      const v=cands.filter(c=>c.adv>0);
      if(!v.length) return null;
      return v.sort((a,b)=>{
        const n=c=>{let x=0;for(const nid of territories[c.toId].neighbors)if(territories[nid].player!==player&&!waterSet.has(nid))x++;return x;};
        return n(b)-n(a);
      })[0];
    }
  }
  return null;
}

function aiStep(){
  if(phase!=='playing'||currentPlayer===HUMAN) return;
  const atk=bestAttack(currentPlayer);
  if(atk){
    consecutivePasses=0;
    doAttack(atk.fromId,atk.toId);   // doAttack schedules next step
  } else {
    consecutivePasses++;
    // Count active (living) players
    const activePlayers=new Set(territories.filter(t=>!waterSet.has(t.id)&&t.player>=0).map(t=>t.player));
    if(consecutivePasses>=activePlayers.size){
      // All remaining players passed — stalemate: winner by territory count
      resolveStalemate();
    } else {
      aiTimer=setTimeout(endTurn,AI_MS/2);
    }
  }
}

function resolveStalemate(){
  phase='gameover';
  const counts={};
  for(const t of territories){
    if(waterSet.has(t.id)||t.player<0) continue;
    counts[t.player]=(counts[t.player]||0)+1;
  }
  const winner=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0]|0;
  const tied=Object.entries(counts).filter(([,v])=>v===counts[winner]).length>1;
  if(tied){
    document.getElementById('win-title').textContent='⏱️ Stalemate!';
    document.getElementById('win-msg').textContent='No player can make progress. The game ends in a draw.';
  } else {
    document.getElementById('win-title').textContent= winner==HUMAN ? '🎉 You Win!' : `${NAMES[winner]} Wins!`;
    document.getElementById('win-msg').textContent  = winner==HUMAN ? 'You controlled the most territory!' : `${NAMES[winner]} controlled the most territory.`;
  }
  document.getElementById('win-overlay').classList.add('show');
  render();
}

// ── WIN CHECK ─────────────────────────────────────────────────────────────────
function checkWin(){
  const landTerrs=territories.filter(t=>!waterSet.has(t.id)&&t.player>=0);
  const alive=[...new Set(landTerrs.map(t=>t.player))];
  if(alive.length>1) return false;
  phase='gameover';
  const winner=alive[0];
  document.getElementById('win-title').textContent = (winner===0) ? '🎉 You Win!' : `${NAMES[winner]} Wins!`;
  document.getElementById('win-msg').textContent   = (winner===0) ? 'You conquered the map!' : `${NAMES[winner]} dominated the map.`;
  document.getElementById('win-overlay').classList.add('show');
  render();return true;
}

// ── UI ────────────────────────────────────────────────────────────────────────
function updateUI(){
  const lbl=document.getElementById('turn-label');
  lbl.textContent=currentPlayer===HUMAN?'🫵 Your Turn':`${NAMES[currentPlayer]}'s Turn`;
  lbl.style.background=COLORS[currentPlayer]+'30';
  lbl.style.color=COLORS[currentPlayer];
  lbl.style.border=`1px solid ${COLORS[currentPlayer]}60`;
  const bonus=largestGroup(currentPlayer);
  document.getElementById('bonus-label').textContent=`+${bonus} bonus ${bonus===1?'die':'dice'} on end turn`;
  document.getElementById('end-btn').disabled=phase!=='playing'||currentPlayer!==HUMAN||battleAnimating;
  const counts={};
  for(const t of territories){
    if(waterSet.has(t.id)) continue;
    if(!counts[t.player]) counts[t.player]={terrs:0,dice:0};
    counts[t.player].terrs++;counts[t.player].dice+=t.dice;
  }
  const sb=document.getElementById('scoreboard');sb.innerHTML='';
  for(let p=0;p<NUM_PL;p++){
    const card=document.createElement('div');
    const stats=counts[p];
    const strat=STRATEGIES[p]?`<span class="score-strat">${STRATEGIES[p]}</span>`:'';
    card.className='score-card'+((!stats)?' eliminated':'')+(p===currentPlayer?' active-turn':'');
    card.innerHTML=`<div class="score-dot" style="background:${COLORS[p]}"></div>
      <span class="score-name">${NAMES[p]}</span>${strat}
      <span class="score-stats">${stats?`${stats.terrs}T · ${stats.dice}🎲`:'out'}</span>`;
    sb.appendChild(card);
  }
}

newGame();
</script>
